<div class="page-container env-page project-page" id="container-M05001">
    <section class="env-workspace" aria-labelledby="rule-select-title-M05001">
        <aside class="env-object-panel">
            <header class="env-object-header">
                <div>
                    <h2 class="env-section-title">Rule Candidates</h2>
                    <p class="env-section-desc">발굴 규칙 후보</p>
                </div>
                <div class="env-object-actions">
                    <button type="button" class="env-icon-btn" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <div class="env-object-search">
                <i class="fas fa-search"></i>
                <input type="search" placeholder="Search candidate">
            </div>

            <div class="project-list">
                <div class="project-list-head">
                    <div>Candidate</div>
                    <div>Score</div>
                </div>
                <div class="project-empty">No rule candidates.</div>
                <div class="list-count-footer">0 items</div>
            </div>
        </aside>

        <section class="env-panel" aria-labelledby="rule-select-title-M05001">
            <header class="env-header">
                <div>
                    <h1 class="env-title" id="rule-select-title-M05001">발굴 규칙 선정</h1>
                    <p class="env-desc">자동 규칙 발굴 결과를 검토하고 업무 규칙으로 선정합니다.</p>
                </div>
                <div class="env-header-actions">
                    <button type="button" class="env-btn">New</button>
                    <button type="button" class="env-btn env-save">
                        <i class="fas fa-save"></i>
                        <span>Save</span>
                    </button>
                </div>
            </header>

            <div class="table-meta-strip">
                <div><span>Candidate</span><strong>-</strong></div>
                <div><span>Confidence</span><strong>0%</strong></div>
                <div><span>Decision</span><strong>-</strong></div>
            </div>

            <div class="table-tabs">
                <button type="button" class="table-tab is-active">Rule Detail</button>
                <button type="button" class="table-tab">Evidence</button>
                <button type="button" class="table-tab">Decision Log</button>
            </div>

            <section class="env-object-meta">
                <div class="env-meta-grid">
                    <label>
                        <span>Rule ID</span>
                        <input class="env-field env-meta-field" type="text" readonly>
                    </label>
                    <label>
                        <span>Rule Type</span>
                        <select class="env-field env-meta-field">
                            <option value="">-- Select rule type --</option>
                            <option value="PROFILE">PROFILE</option>
                            <option value="CORRELATION">CORRELATION</option>
                            <option value="MINING">MINING</option>
                        </select>
                    </label>
                    <label>
                        <span>Decision</span>
                        <select class="env-field env-meta-field">
                            <option value="">-- Select decision --</option>
                            <option value="ACCEPT">Accept</option>
                            <option value="HOLD">Hold</option>
                            <option value="REJECT">Reject</option>
                        </select>
                    </label>
                    <label>
                        <span>Severity</span>
                        <select class="env-field env-meta-field">
                            <option value="">-- Select severity --</option>
                            <option value="INFO">INFO</option>
                            <option value="WARNING">WARNING</option>
                            <option value="ERROR">ERROR</option>
                        </select>
                    </label>
                    <label class="env-meta-wide">
                        <span>Rule Name</span>
                        <input class="env-field env-meta-field" type="text">
                    </label>
                    <label class="env-meta-wide">
                        <span>Rule Expression</span>
                        <textarea class="env-field env-meta-textarea" rows="7" spellcheck="false"></textarea>
                    </label>
                </div>
            </section>

            <section class="table-result-grid">
                <table class="table-grid">
                    <thead>
                        <tr>
                            <th>Column</th>
                            <th>Pattern</th>
                            <th>Support</th>
                            <th>Confidence</th>
                            <th>Impact</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" class="table-empty">No evidence rows.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </section>
</div>
