<div class="space-y-6 animate-fadeIn">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">시스템 설정</h1>
            <p class="text-gray-500 text-sm mt-1">사용자 계정 및 시스템 환경을 구성합니다.</p>
        </div>
        <button onclick="M05001.saveAllSettings()" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 transition">
            <i class="fas fa-save mr-2"></i>모든 설정 저장
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-2">
            <button onclick="M05001.switchTab('profile')" id="tab-btn-profile" class="w-full flex items-center gap-3 p-4 rounded-xl border transition-all bg-white border-blue-500 text-blue-600 shadow-sm font-bold">
                <i class="fas fa-user-circle text-lg"></i>
                <div class="text-left">
                    <div class="text-sm">사용자 프로필</div>
                    <div class="text-[10px] opacity-70 font-normal">계정 정보 및 보안 설정</div>
                </div>
            </button>
            <button onclick="M05001.switchTab('system')" id="tab-btn-system" class="w-full flex items-center gap-3 p-4 rounded-xl border transition-all bg-white border-gray-100 text-gray-600 hover:bg-gray-50">
                <i class="fas fa-server text-lg"></i>
                <div class="text-left">
                    <div class="text-sm">시스템 환경</div>
                    <div class="text-[10px] opacity-70 font-normal">DB 연결 및 성능 최적화</div>
                </div>
            </button>
            <button onclick="M05001.switchTab('notification')" id="tab-btn-notification" class="w-full flex items-center gap-3 p-4 rounded-xl border transition-all bg-white border-gray-100 text-gray-600 hover:bg-gray-50">
                <i class="fas fa-bell text-lg"></i>
                <div class="text-left">
                    <div class="text-sm">알림 및 모니터링</div>
                    <div class="text-[10px] opacity-70 font-normal">위반 알림 및 로그 설정</div>
                </div>
            </button>
        </div>

        <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div id="tab-content-profile" class="p-8 space-y-6">
                <h3 class="text-lg font-bold text-gray-800 border-b pb-4">사용자 프로필 설정</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase">사용자 이름</label>
                        <input type="text" value="관리자" class="w-full border-gray-200 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase">이메일</label>
                        <input type="email" value="admin@example.com" class="w-full border-gray-200 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div class="pt-4">
                    <button class="text-sm font-bold text-blue-600 hover:underline">비밀번호 변경하기</button>
                </div>
            </div>

            <div id="tab-content-system" class="p-8 space-y-6 hidden">
                <h3 class="text-lg font-bold text-gray-800 border-b pb-4">시스템 환경 구성</h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                        <div>
                            <div class="font-bold text-gray-700">자동 에디팅 실행</div>
                            <div class="text-xs text-gray-500">데이터 업로드 시 사전 정의된 규칙을 즉시 적용합니다.</div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase">데이터 보관 기간 (일)</label>
                        <select class="w-full border-gray-200 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
                            <option>30일</option>
                            <option selected>90일</option>
                            <option>180일</option>
                            <option>영구 보관</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="tab-content-notification" class="p-8 space-y-6 hidden">
                <h3 class="text-lg font-bold text-gray-800 border-b pb-4">알림 채널 설정</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50 transition cursor-pointer">
                        <input type="checkbox" checked class="w-4 h-4 text-blue-600">
                        <span class="text-sm text-gray-700 font-medium">중요 위반 사항 발생 시 메일 알림</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50 transition cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 text-blue-600">
                        <span class="text-sm text-gray-700 font-medium">주간 통계 보고서 자동 발송</span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
