<div class="space-y-6 animate-fadeIn">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">규칙발굴</h1>
            <p class="text-gray-500 text-sm mt-1">데이터 속에 숨겨진 비즈니스 규칙을 자동으로 찾아냅니다.</p>
        </div>
        <div class="flex gap-2">
            <button onclick="M02001.startDiscovery()" id="runBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700 transition-all flex items-center">
                <i class="fas fa-search mr-2"></i>규칙 발굴 시작
            </button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-700">
            <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xs font-bold">1</span>
            발굴 조건 설정
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1 font-mono">TARGET_TABLE</label>
                    <select id="targetTable" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">로딩 중...</option>
                        <!-- <option value="POPULATION">POPULATION (인구 데이터)</option>
                        <option value="HOUSEHOLD">HOUSEHOLD (가구 데이터)</option>
                        <option value="CUSTOMERS">CUSTOMERS (고객 마스터)</option> -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1 font-mono">TARGET_COLUMN</label>
                    <select id="targetColumn" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">테이블을 먼저 선택하세요</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">발굴 규칙 유형</label>
                <div class="space-y-2 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-600">범위 규칙 (Range Rules)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-600">형식 규칙 (Format/Pattern)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-600">참조 무결성 (Referential)</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2 font-mono">MIN_CONFIDENCE (%)</label>
                <div class="flex items-center gap-4 mt-2">
                    <input type="range" min="50" max="100" value="95" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <span class="text-blue-600 font-bold w-12 text-right">95%</span>
                </div>
                <p class="text-[11px] text-gray-400 mt-3">* 설정한 신뢰도 이상의 규칙만 결과에 포함됩니다.</p>
            </div>
        </div>
    </div>

    <div id="discoveryStatus" class="hidden bg-blue-50 p-5 rounded-xl border border-blue-200 flex items-center gap-4">
        <div class="animate-spin text-blue-600 text-xl"><i class="fas fa-circle-notch"></i></div>
        <div>
            <p class="text-blue-700 font-bold">오라클 ML 규칙 발굴 엔진 가동 중...</p>
            <p class="text-blue-500 text-xs">데이터 패턴을 분석하여 비즈니스 룰을 추출하고 있습니다.</p>
        </div>
    </div>

    <div id="resultSection" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h2 class="font-bold text-gray-700 flex items-center gap-2">
                <i class="fas fa-list-check text-blue-500"></i> 발굴된 규칙 목록
            </h2>
            <span class="text-xs text-gray-500">총 <span id="rule-count" class="font-bold text-blue-600">0</span>건 발견</span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-bold">
                    <tr>
                        <th class="px-6 py-3 border-b">유형</th>
                        <th class="px-6 py-3 border-b">규칙 설명</th>
                        <th class="px-6 py-3 border-b text-center">신뢰도</th>
                        <th class="px-6 py-3 border-b text-right">관리</th>
                    </tr>
                </thead>
                <tbody id="discovery-tbody" class="text-sm divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
    </div>
</div>
