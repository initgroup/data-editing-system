<div class="page-container env-page project-page account-page" id="container-M91001">
    <section class="env-workspace" aria-labelledby="settings-title-M91001">
        <aside class="env-object-panel">
            <header class="env-object-header">
                <div>
                    <h2 class="env-section-title" data-label-key="accountCategoryTitle">Account</h2>
                    <p class="env-section-desc" data-label-key="accountCategoryDescription">Manage my account information.</p>
                </div>
                <div class="env-object-actions">
                    <button type="button" class="env-icon-btn" title="Refresh" onclick="M91001.refreshSelectedCategory()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>
            <div id="settingCategoryList-M91001" class="env-tree-grid project-list"></div>
        </aside>

        <section class="env-panel" aria-labelledby="settings-title-M91001">
            <header class="env-header">
                <h1 class="env-title" id="settings-title-M91001" data-label-key="myAccountTitle">My Account</h1>
                <p class="env-desc" id="settingsDescription-M91001" data-label-key="myAccountDescription">Manage your account information and personal Gemini API key.</p>
            </header>

            <section class="scenario-list-panel" aria-label="Settings list" data-setting-panel>
                <div class="scenario-list-toolbar">
                    <strong id="selectedSettingCategoryName-M91001">Settings</strong>
                    <button type="button" class="env-btn env-cancel scenario-new-btn" onclick="M91001.newSetting()">
                        <i class="fas fa-plus"></i>
                        <span>New setting</span>
                    </button>
                </div>
                <div id="settingsGrid-M91001" class="scenario-list" aria-label="Settings"></div>
            </section>

            <section class="env-object-meta scenario-detail" aria-label="Setting detail" data-setting-panel>
                <div class="env-meta-grid scenario-meta-grid">
                    <label>
                        <span>Category</span>
                        <input id="settingCategory-M91001" class="env-field env-meta-field" type="text" readonly>
                    </label>
                    <label>
                        <span>Use</span>
                        <select id="settingUseYn-M91001" class="env-field env-meta-field">
                            <option value="Y">Y</option>
                            <option value="N">N</option>
                        </select>
                    </label>
                    <label>
                        <span>Sort</span>
                        <input id="settingSortOrder-M91001" class="env-field env-meta-field" type="number">
                    </label>
                    <label class="env-meta-wide">
                        <span class="required-title">Key</span>
                        <input id="settingKey-M91001" class="env-field env-meta-field" type="text" placeholder="SYSTEM_DISPLAY_NAME">
                    </label>
                    <label class="env-meta-wide">
                        <span>Value</span>
                        <textarea id="settingValue-M91001" class="env-field env-meta-textarea" rows="5"></textarea>
                    </label>
                    <label class="env-meta-wide">
                        <span>Description</span>
                        <textarea id="settingDesc-M91001" class="env-field env-meta-textarea" rows="3"></textarea>
                    </label>
                </div>
            </section>

            <section class="env-object-meta scenario-detail m91002-password-panel m91002-account-panel" aria-label="My account" data-account-panel hidden>
                <div class="scenario-list-toolbar">
                    <strong data-label-key="myAccountSection">My Account</strong>
                </div>
                <div class="env-meta-grid scenario-meta-grid">
                    <label>
                        <span data-label-key="loginId">Login ID</span>
                        <input id="accountLoginId-M91001" class="env-field env-meta-field" type="text" readonly>
                    </label>
                    <label>
                        <span data-label-key="userName">User Name</span>
                        <input id="accountUserName-M91001" class="env-field env-meta-field" type="text" onkeydown="M91001.handleUserNameKey(event)">
                    </label>
                    <label>
                        <span data-label-key="role">Role</span>
                        <input id="accountRoleCode-M91001" class="env-field env-meta-field" type="text" readonly>
                    </label>
                    <label class="env-meta-wide">
                        <span data-label-key="email">Email</span>
                        <input id="accountEmail-M91001" class="env-field env-meta-field" type="text" readonly>
                    </label>
                </div>
                <div class="env-footer-group" style="justify-content: flex-end; margin-top: 12px;">
                    <button type="button" class="env-btn env-save" onclick="M91001.changeUserName()">
                        <i class="fas fa-user-pen"></i>
                        <span data-label-key="saveName">Save name</span>
                    </button>
                </div>

                <div class="scenario-list-toolbar">
                    <strong data-label-key="emailSection">Email</strong>
                </div>
                <div class="env-meta-grid scenario-meta-grid">
                    <label>
                        <span class="required-title" data-label-key="newEmail">New Email</span>
                        <input id="newEmail-M91001" class="env-field env-meta-field" type="email" autocomplete="email">
                    </label>
                    <label>
                        <span class="required-title" data-label-key="currentPassword">Current Password</span>
                        <input id="emailCurrentPassword-M91001" class="env-field env-meta-field" type="password" autocomplete="current-password" onkeydown="M91001.handleEmailKey(event)">
                    </label>
                    <label>
                        <span data-label-key="action">Action</span>
                        <button type="button" class="env-btn env-save" onclick="M91001.changeEmail()">
                            <i class="fas fa-envelope"></i>
                            <span data-label-key="changeEmail">Change email</span>
                        </button>
                    </label>
                </div>

                <div class="scenario-list-toolbar">
                    <strong data-label-key="passwordSection">Password</strong>
                </div>
                <div class="env-meta-grid scenario-meta-grid">
                    <label>
                        <span class="required-title" data-label-key="currentPassword">Current Password</span>
                        <input id="currentPassword-M91001" class="env-field env-meta-field" type="password" autocomplete="current-password">
                    </label>
                    <label>
                        <span class="required-title" data-label-key="newPassword">New Password</span>
                        <input id="newPassword-M91001" class="env-field env-meta-field" type="password" autocomplete="new-password">
                    </label>
                    <label>
                        <span class="required-title" data-label-key="confirmNewPassword">Confirm New Password</span>
                        <input id="newPasswordConfirm-M91001" class="env-field env-meta-field" type="password" autocomplete="new-password" onkeydown="M91001.handlePasswordKey(event)">
                    </label>
                    <label class="env-meta-wide">
                        <span data-label-key="passwordRule">Rule</span>
                        <textarea class="env-field env-meta-field m91001-note-field" rows="2" readonly data-value-key="passwordRuleText">Use at least 8 characters. Temporary passwords can be changed here after login.</textarea>
                    </label>
                </div>
                <div class="env-footer-group" style="justify-content: flex-end; margin-top: 12px;">
                    <button type="button" class="env-btn env-save" onclick="M91001.changePassword()">
                        <i class="fas fa-key"></i>
                        <span data-label-key="changePassword">Change password</span>
                    </button>
                    <button type="button" class="env-btn env-cancel" onclick="M91001.clearPasswordForm()">
                        <i class="fas fa-eraser" aria-hidden="true"></i>
                        <span data-label-key="clear">Clear</span>
                    </button>
                </div>

                <div class="scenario-list-toolbar">
                    <strong data-label-key="geminiApiPersonalKey">Gemini API Personal Key</strong>
                </div>
                <div class="env-meta-grid scenario-meta-grid">
                    <label class="env-meta-wide">
                        <span data-label-key="status">Status</span>
                        <input id="geminiApiKeyStatus-M91001" class="env-field env-meta-field" type="text" readonly value="Not registered" data-value-key="notRegistered">
                    </label>
                    <label class="env-meta-wide">
                        <span data-label-key="geminiApiKey">Gemini API Key</span>
                        <input id="geminiApiKey-M91001" class="env-field env-meta-field" type="password" autocomplete="off" placeholder="Enter a new Gemini API key" data-placeholder-key="geminiApiKeyPlaceholder">
                    </label>
                    <label class="env-meta-wide">
                        <span data-label-key="guide">Guide</span>
                        <textarea class="env-field env-meta-field m91001-note-field" rows="2" readonly data-value-key="geminiGuideText">This key is used only for your right sidebar Gemini assistant. Saved keys are not displayed again.</textarea>
                    </label>
                </div>
                <div class="env-footer-group" style="justify-content: flex-end; margin-top: 12px;">
                    <button type="button" class="env-btn env-save" onclick="M91001.saveGeminiApiKey()">
                        <i class="fas fa-robot"></i>
                        <span data-label-key="saveGeminiKey">Save Gemini key</span>
                    </button>
                    <button type="button" class="env-btn env-danger" onclick="M91001.deleteGeminiApiKey()">
                        <i class="far fa-trash-alt"></i>
                        <span data-label-key="deleteGeminiKey">Delete Gemini key</span>
                    </button>
                </div>
            </section>

            <footer class="env-footer">
                <div class="env-footer-group">
                    <span id="systemMessage-M91001" class="env-detail-hint" aria-live="polite">Settings are stored per login user and selected Target DB in INIT$_TB_SYSTEM_SETTING.</span>
                </div>
                <div class="env-footer-group" data-setting-actions>
                    <button type="button" class="env-btn env-save" onclick="M91001.saveSetting()">
                        <i class="far fa-save" aria-hidden="true"></i>
                        <span data-label-key="save">Save</span>
                    </button>
                    <button type="button" class="env-btn env-cancel" onclick="M91001.newSetting()">
                        <i class="fas fa-undo-alt" aria-hidden="true"></i>
                        <span data-label-key="cancel">Cancel</span>
                    </button>
                    <button type="button" class="env-btn env-danger" onclick="M91001.deleteSetting()">
                        <i class="far fa-trash-alt" aria-hidden="true"></i>
                        <span data-label-key="delete">Delete</span>
                    </button>
                </div>
            </footer>
        </section>
    </section>
</div>
