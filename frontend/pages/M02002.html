<div class="page-container table-page" id="container-M02002">
    <section class="work-context-card" aria-label="Project and scenario context">
        <header class="work-context-header">
            <div class="work-context-title-row">
                <span><strong>Project Scenario</strong> <span>Select the required project and scenario for this menu.</span></span>
                <span><strong>Scenario Tables</strong> <span>Tables registered to the selected scenario.</span></span>
            </div>
            <div class="scenario-table-actions">
                <button type="button" class="table-icon-btn" title="Refresh project and scenario" onclick="M02002.refreshWorkContext()">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button type="button" class="table-btn" onclick="M02002.saveScenarioTable()">
                    <i class="fas fa-save"></i>
                    <span>Save</span>
                </button>
                <button type="button" class="table-btn table-danger-btn" onclick="M02002.deleteScenarioTable()">
                    <i class="far fa-trash-alt"></i>
                    <span>Delete</span>
                </button>
                <button type="button" class="table-btn table-danger-btn" onclick="M02002.deleteAllScenarioTables()">
                    <i class="fas fa-trash-can"></i>
                    <span>Delete all</span>
                </button>
            </div>
        </header>
        <div class="work-context-bar">
            <label>
                <span class="required-title">Project</span>
                <select id="contextProject-M02002" class="work-context-select" onchange="M02002.handleContextProjectChange(this.value)">
                    <option value="">-- Select project --</option>
                </select>
            </label>
            <label>
                <span class="required-title">Scenario</span>
                <select id="contextScenario-M02002" class="work-context-select" onchange="M02002.handleContextScenarioChange(this.value)">
                    <option value="">-- Select scenario --</option>
                </select>
            </label>
        </div>
        <div id="scenarioTablesGrid-M02002" class="scenario-table-grid"></div>
    </section>

    <section class="table-workspace" aria-labelledby="table-title-M02002">
        <aside class="table-object-panel">
            <header class="table-object-header">
                <div>
                    <h2 class="table-section-title">Table Explorer</h2>
                    <p class="table-section-desc">User tables for data analysis.</p>
                </div>
                <div class="table-object-actions">
                    <button type="button" class="table-icon-btn" title="Refresh tables" onclick="M02002.loadTableTree()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>
            <div class="table-object-search">
                <i class="fas fa-search"></i>
                <input
                    id="tableSearch-M02002"
                    type="search"
                    placeholder="Search table"
                    aria-label="Search table"
                    oninput="M02002.handleTableSearchInput()"
                    onkeydown="M02002.handleTableSearchKey(event)"
                >
            </div>
            <div id="tableTree-M02002" class="table-tree-grid"></div>
        </aside>

        <section class="table-panel" aria-labelledby="table-title-M02002">
            <header class="table-header">
                <div>
                    <h1 class="table-title" id="table-title-M02002">Table Analysis</h1>
                    <p class="table-desc" id="tableDescription-M02002">Select a table from the explorer.</p>
                </div>
                <div class="table-export-actions" aria-label="Export current grid">
                    <button type="button" class="table-btn" onclick="M02002.moveSelectedTableToScenario()">
                        <i class="fas fa-arrow-up-from-bracket"></i>
                        <span>Add selected</span>
                    </button>
                </div>
            </header>

            <nav class="table-tabs" aria-label="Table analysis tabs">
                <button type="button" class="table-tab is-active" data-tab="columns" onclick="M02002.switchTab('columns')">
                    <i class="fas fa-list"></i>
                    <span>Columns</span>
                </button>
                <button type="button" class="table-tab" data-tab="data" onclick="M02002.switchTab('data')">
                    <i class="fas fa-table"></i>
                    <span>Data</span>
                </button>
                <button type="button" class="table-tab" data-tab="sql" onclick="M02002.switchTab('sql')">
                    <i class="fas fa-terminal"></i>
                    <span>SQL</span>
                </button>
            </nav>

            <section class="table-tab-panel is-active" data-panel="columns">
                <div class="table-meta-strip">
                    <div>
                        <span>Owner</span>
                        <strong id="selectedOwner-M02002">-</strong>
                    </div>
                    <div>
                        <span>Table ID</span>
                        <strong id="selectedTable-M02002">-</strong>
                    </div>
                    <div>
                        <span>Comment</span>
                        <strong id="selectedComment-M02002">-</strong>
                    </div>
                    <div>
                        <span>Created At</span>
                        <strong id="selectedCreatedAt-M02002">-</strong>
                    </div>
                </div>
                <div class="grid-command-area">
                    <div class="grid-command-toolbar">
                        <div class="data-grid-topbar">
                            <div class="data-grid-status"><div id="columnsGridMessage-M02002" class="table-empty data-grid-message"></div></div>
                            <div id="columnsGridControls-M02002" class="grid-pager-host"></div>
                            <span class="grid-export-actions"><button type="button" class="table-icon-btn" title="Export Excel" data-title-key="exportExcelTitle" onclick="M02002.exportGrid('columns','excel')"><i class="fas fa-file-excel"></i></button><button type="button" class="table-icon-btn" title="Export CSV" data-title-key="exportCsvTitle" onclick="M02002.exportGrid('columns','csv')"><i class="fas fa-file-csv"></i></button><button type="button" class="table-icon-btn" title="Export JSON" data-title-key="exportJsonTitle" onclick="M02002.exportGrid('columns','json')"><i class="fas fa-file-code"></i></button></span>
                        </div>
                    </div>
                </div>
                <div id="columnsGrid-M02002" class="table-result-grid m02002-grid"></div>
            </section>

            <section class="table-tab-panel" data-panel="data">
                <div class="grid-command-area">
                    <div class="grid-command-extra grid-command-extra-actions"><button type="button" class="table-btn" onclick="M02002.loadTableData(1)"><i class="fas fa-play"></i><span>Query Data</span></button></div>
                    <div class="grid-command-toolbar">
                        <div class="data-grid-topbar"><div class="data-grid-status"><div id="dataGridPager-M02002" class="grid-pager-host" hidden></div><div id="dataGridMessage-M02002" class="table-empty data-grid-message"></div></div><span class="grid-export-actions"><button type="button" class="table-icon-btn" title="Export Excel" data-title-key="exportExcelTitle" onclick="M02002.exportGrid('data','excel')"><i class="fas fa-file-excel"></i></button><button type="button" class="table-icon-btn" title="Export CSV" data-title-key="exportCsvTitle" onclick="M02002.exportGrid('data','csv')"><i class="fas fa-file-csv"></i></button><button type="button" class="table-icon-btn" title="Export JSON" data-title-key="exportJsonTitle" onclick="M02002.exportGrid('data','json')"><i class="fas fa-file-code"></i></button></span></div>
                    </div>
                </div>
                <div id="dataGrid-M02002" class="table-result-grid m02002-grid"></div>
            </section>

            <section class="table-tab-panel" data-panel="sql">
                <div class="sql-workbench">
                    <div class="grid-command-area"><div class="grid-command-toolbar sql-toolbar data-sql-editor-toolbar">
                        <button type="button" class="table-icon-btn sql-tool-icon-btn sql-run-btn" title="Run SQL (Ctrl+Enter)" aria-label="Run SQL" onclick="M02002.executeSql()">
                            <i class="fas fa-play"></i>
                        </button>
                    </div></div>
                    <textarea id="sqlEditor-M02002" class="sql-editor table-sql-editor" spellcheck="false" aria-label="SQL worksheet"></textarea>
                    <div class="grid-command-area"><div class="grid-command-toolbar"><div class="data-grid-topbar"><div class="data-grid-status"><div id="sqlGridPager-M02002" class="grid-pager-host" hidden></div><div id="sqlMessage-M02002" class="table-empty data-grid-message" aria-live="polite"></div></div><span class="grid-export-actions"><button type="button" class="table-icon-btn" title="Export Excel" data-title-key="exportExcelTitle" onclick="M02002.exportGrid('sql','excel')"><i class="fas fa-file-excel"></i></button><button type="button" class="table-icon-btn" title="Export CSV" data-title-key="exportCsvTitle" onclick="M02002.exportGrid('sql','csv')"><i class="fas fa-file-csv"></i></button><button type="button" class="table-icon-btn" title="Export JSON" data-title-key="exportJsonTitle" onclick="M02002.exportGrid('sql','json')"><i class="fas fa-file-code"></i></button></span></div></div></div>
                    <div id="sqlGrid-M02002" class="table-result-grid m02002-grid"></div>
                </div>
            </section>
        </section>
    </section>
</div>
