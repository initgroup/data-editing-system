<div class="page-container table-page m04002-page" id="container-M04002">
    <section class="m04002-header">
        <div>
            <p>Integrated Editing Result Analysis</p>
            <h2>통합 에디팅 결과분석</h2>
            <span>통합시나리오 실행 이력과 노드별 결과 테이블 / Oracle ML 모델뷰를 전체 조회합니다.</span>
        </div>
        <div class="m04002-actions">
            <button type="button" class="table-btn" onclick="M04002.loadRuns()">
                <i class="fas fa-sync-alt"></i>
                Refresh
            </button>
            <button type="button" class="table-btn" onclick="M04002.exportCurrent()">
                <i class="fas fa-file-export"></i>
                Export CSV
            </button>
        </div>
    </section>

    <section class="m04002-toolbar">
        <label>
            <span>Project</span>
            <select id="projectId-M04002" onchange="M04002.handleProjectChange()">
                <option value="">Loading projects...</option>
            </select>
        </label>
        <label>
            <span>Scenario</span>
            <select id="scenarioId-M04002" onchange="M04002.loadRuns(1)">
                <option value="">ALL</option>
            </select>
        </label>
        <label>
            <span>Status</span>
            <select id="status-M04002" onchange="M04002.loadRuns(1)">
                <option value="ALL">ALL</option>
                <option value="SUCCESS">SUCCESS</option>
                <option value="FAILED">FAILED</option>
                <option value="STARTED">STARTED</option>
                <option value="RUNNING">RUNNING</option>
            </select>
        </label>
        <label>
            <span>Keyword</span>
            <input id="keyword-M04002" type="search" placeholder="Run ID or flow name" onkeydown="M04002.handleKeywordKeydown(event)">
        </label>
        <label>
            <span>Rows</span>
            <select id="pageSize-M04002" onchange="M04002.loadRuns(1)">
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </label>
    </section>

    <section class="m04002-layout">
        <aside class="m04002-run-panel">
            <header>
                <strong>Scenario Runs</strong>
                <span id="runCount-M04002">0 rows</span>
            </header>
            <div id="runList-M04002" class="m04002-run-list"></div>
            <footer class="m04002-pager">
                <button type="button" onclick="M04002.changeRunPage(-1)"><i class="fas fa-chevron-left"></i></button>
                <span id="runPage-M04002">1 / 1</span>
                <button type="button" onclick="M04002.changeRunPage(1)"><i class="fas fa-chevron-right"></i></button>
            </footer>
        </aside>

        <main class="m04002-detail-panel">
            <section id="runSummary-M04002" class="m04002-summary">
                <div class="table-empty">실행 이력을 선택하세요.</div>
            </section>
            <section>
                <div id="nodeList-M04002" class="m04002-node-grid"></div>
            </section>
            <section id="resultPanel-M04002" class="m04002-result-panel">
                <div class="table-empty">노드를 선택하면 결과 상세가 표시됩니다.</div>
            </section>
        </main>
    </section>
</div>
