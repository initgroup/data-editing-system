<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">본 페이지의 주요 기능을 설명합니다.</h1>
    </div>

    <div class="search-section">
        <div class="filter-grid">
            <div class="form-group">
                <label for="mainCombo" class="form-label required">메인 그룹</label>
                <select id="mainCombo" class="form-control">
                    <option value="">선택하세요</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="subCombo" class="form-label">서브 그룹</label>
                <select id="subCombo" class="form-control" disabled>
                    <option value="">메인 먼저 선택</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="textSearch" class="form-label">검색어</label>
                <input type="text" id="textSearch" class="form-control" placeholder="검색어 입력">
            </div>
            
            <div class="form-group">
                <label for="dateSearch" class="form-label required">기준 일자</label>
                <input type="date" id="dateSearch" class="form-control">
            </div>

            <div class="form-group lg-col-span-2">
                <label class="form-label">상태 선택 (다중선택)</label>
                <div class="checkbox-group" id="checkboxArea">
                    <label class="checkbox-item">
                        <input type="checkbox" value="C01" class="status-chk"> <span>상태 A</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="C02" class="status-chk"> <span>상태 B</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="action-bar">
            <button onclick="M00000.resetSearch()" class="btn bg-gray-500 hover:bg-gray-600 text-white">
                <i class="fas fa-undo mr-1"></i> 초기화
            </button>            
            <button onclick="M00000.executeProcedure()" class="btn btn-purple">
                <i class="fas fa-bolt mr-1"></i> 프로시저 호출
            </button>
            <button onclick="M00000.searchSync()" class="btn btn-primary">
                <i class="fas fa-search mr-1"></i> 데이터 조회
            </button>
        </div>
    </div>
    <div class="result-section">
        <div class="result-header">
            <h4 class="card-title">
                <i class="fas fa-table mr-2"></i>실시간 분석 데이터 결과
            </h4>
            <div class="result-tools">
                <button onclick="M00000.downloadExcel()" class="btn-icon-excel" title="엑셀 다운로드">
                    <i class="fas fa-file-excel"></i>
                </button>
            </div>
        </div>
        <div id="gridContainer" class="table-container"></div>
    </div>
</div>
