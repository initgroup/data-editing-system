<div class="space-y-6 animate-fadeIn relative">
    <div class="flex justify-between items-end mb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">종합 컨트롤 예제2</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="M00000.downloadExcel()" title="현재 조회된 데이터를 CSV로 다운로드합니다." 
                class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-green-700 transition-all flex items-center">
                <i class="fas fa-file-excel mr-2"></i>엑셀 다운로드
            </button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label for="mainCombo" class="block text-sm font-semibold text-gray-600 mb-1 cursor-pointer">메인 그룹</label>
                <select id="mainCombo" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none transition-colors">
                    <option value="">선택하세요</option>
                </select>
            </div>
            
            <div>
                <label for="subCombo" class="block text-sm font-semibold text-gray-600 mb-1 cursor-pointer">서브 그룹 (자동 연동)</label>
                <select id="subCombo" class="w-full border-gray-300 rounded-lg p-2.5 border bg-gray-50 outline-none transition-colors disabled:cursor-not-allowed" disabled>
                    <option value="">메인을 먼저 선택하세요</option>
                </select>
            </div>
            
            <div>
                <label for="textSearch" class="block text-sm font-semibold text-gray-600 mb-1 cursor-pointer">검색어</label>
                <input type="text" id="textSearch" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="검색어 입력">
            </div>
            
            <div>
                <label for="dateSearch" class="block text-sm font-semibold text-gray-600 mb-1 cursor-pointer">기준 일자</label>
                <input type="date" id="dateSearch" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 transition-colors">
            </div>

            <div class="md:col-span-2">
                <span class="block text-sm font-semibold text-gray-600 mb-2">상태 선택 (다중선택 - IN절 테스트)</span>
                <div class="flex gap-4" id="checkboxArea">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" value="C01" class="status-chk w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer"> 
                        <span class="text-sm">상태 A</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" value="C02" class="status-chk w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer"> 
                        <span class="text-sm">상태 B</span>
                    </label>
                </div>
            </div>
            
            <div class="md:col-span-3">
                <label for="memoArea" class="block text-sm font-semibold text-gray-600 mb-2 cursor-pointer">비고 (Textarea)</label>
                <textarea id="memoArea" rows="2" class="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-blue-500 resize-y"></textarea>
            </div>
        </div>
        
        <div class="mt-6 flex justify-end gap-3 border-t pt-4">
            <button onclick="M00000.executeProcedure()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700">프로시저 호출</button>
            <button onclick="M00000.searchSync()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-sm hover:bg-blue-700 transition-colors">
                <i class="fas fa-search mr-1"></i> 조회(동기)
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden p-4 mt-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-gray-700"><i class="fas fa-list mr-2"></i>조회 결과</h2>
            <span class="text-xs text-gray-500">* 헤더를 클릭하여 정렬하거나 행을 선택할 수 있습니다.</span>
        </div>
        <div id="gridContainer" class="w-full"></div>
    </div>
</div>
