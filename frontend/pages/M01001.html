<div class="space-y-6">
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-sm">🔍</span>
            검색 및 필터
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1">데이터명</label>
                <input type="text" id="search-name" class="w-full border-gray-300 rounded-lg p-2 border" placeholder="데이터명을 입력하세요">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1">데이터 유형</label>
                <select id="filter-type" class="w-full border-gray-300 rounded-lg p-2 border">
                    <option value="">전체</option>
                    <option value="csv">CSV</option>
                    <option value="json">JSON</option>
                    <option value="excel">Excel</option>
                    <option value="database">Database</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1">상태</label>
                <select id="filter-status" class="w-full border-gray-300 rounded-lg p-2 border">
                    <option value="">전체</option>
                    <option value="active">활성</option>
                    <option value="inactive">비활성</option>
                    <option value="processing">처리중</option>
                    <option value="error">오류</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button onclick="searchData()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-all">검색</button>
                <button onclick="resetSearch()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg transition-all">초기화</button>
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">데이터 목록</h2>
            <div class="flex gap-2">
                <button onclick="showPage('data-upload.html')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm">데이터 추가</button>
                <button onclick="exportDataList()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm">내보내기</button>
            </div>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left whitespace-nowrap">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs border-y">
                    <tr>
                        <th class="px-4 py-3">번호</th>
                        <th class="px-4 py-3">데이터명</th>
                        <th class="px-4 py-3 text-center">유형</th>
                        <th class="px-4 py-3">크기</th>
                        <th class="px-4 py-3">행수</th>
                        <th class="px-4 py-3 text-center">상태</th>
                        <th class="px-4 py-3">등록일</th>
                        <th class="px-4 py-3 text-center">작업</th>
                    </tr>
                </thead>
                <tbody id="data-tbody" class="divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
        
        <div class="flex justify-between items-center mt-6 text-sm text-gray-600">
            <div>총 <span id="total-count" class="font-bold text-blue-600">0</span>개의 데이터셋</div>
            <div class="flex items-center gap-3">
                <button onclick="changePage('prev')" class="px-3 py-1 bg-white border border-gray-300 hover:bg-gray-50 rounded shadow-sm">이전</button>
                <span class="font-medium">페이지 <span id="current-page" class="text-blue-600">1</span> / <span id="total-pages">1</span></span>
                <button onclick="changePage('next')" class="px-3 py-1 bg-white border border-gray-300 hover:bg-gray-50 rounded shadow-sm">다음</button>
            </div>
        </div>
    </div>
</div>

<div id="preview-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl overflow-hidden">
        <div class="flex justify-between items-center p-4 border-b">
            <h3 class="text-lg font-bold">데이터 미리보기</h3>
            <button onclick="closePreviewModal()" class="text-gray-500 hover:text-gray-700 text-2xl font-bold">&times;</button>
        </div>
        <div id="preview-content" class="p-6 max-h-[70vh] overflow-y-auto">
            </div>
        <div class="p-4 border-t bg-gray-50 flex justify-end gap-2">
            <button onclick="closePreviewModal()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg font-bold">닫기</button>
            <button onclick="showPage('data-preview.html')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold">상세 보기</button>
        </div>
    </div>
</div>
