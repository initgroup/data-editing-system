<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">데이터 조회 및 관리</h1>
    </div>

    <div class="search-section">
        <div class="filter-grid">
            <div class="form-group">
                <label for="search-name" class="form-label">데이터명</label>
                <input type="text" id="search-name" class="form-control" placeholder="데이터명을 입력하세요">
            </div>
            
            <div class="form-group">
                <label for="filter-type" class="form-label">데이터 유형</label>
                <select id="filter-type" class="form-control">
                    <option value="">전체</option>
                    <option value="csv">CSV</option>
                    <option value="json">JSON</option>
                    <option value="excel">Excel</option>
                    <option value="database">Database</option>
                </select>
            </div>
            
            <div class="form-group lg-col-span-2">
                <label class="form-label">추가 필터</label>
                <div class="checkbox-group" id="checkboxArea">
                    <label class="checkbox-item">
                        <input type="checkbox" value="active" class="status-chk"> <span>Active</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="processing" class="status-chk"> <span>Processing</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="action-bar">
            <button onclick="M01001.resetSearch()" class="btn bg-gray-500 hover:bg-gray-600 text-white">
                <i class="fas fa-undo mr-1"></i> 초기화
            </button>
            <button onclick="M01001.searchSync()" class="btn btn-primary">
                <i class="fas fa-search mr-1"></i> 데이터 조회
            </button>
        </div>
    </div>

    <div class="result-section">
        <div class="result-header">
            <h2 class="card-title">
                <i class="fas fa-database mr-2 text-blue-500"></i>조회 데이터 목록
            </h2>
            <button onclick="M01001.downloadExcel()" class="btn-icon-excel" title="엑셀 다운로드">
                <i class="fas fa-file-excel"></i>
            </button>
        </div>
        
        <div id="gridContainer" class="mt-4"></div>
    </div>
</div>

<div id="preview-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl overflow-hidden">
        <div class="flex justify-between items-center p-4 border-b">
            <h3 class="text-lg font-bold">데이터 미리보기</h3>
            <button onclick="M01001.closePreviewModal()" class="text-gray-500 hover:text-gray-700 text-2xl font-bold">&times;</button>
        </div>
        <div id="preview-content" class="p-6 max-h-[70vh] overflow-y-auto"></div>
        <div class="p-4 border-t bg-gray-50 flex justify-end">
            <button onclick="M01001.closePreviewModal()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition-colors">닫기</button>
        </div>
    </div>
</div>
