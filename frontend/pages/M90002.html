<div class="page-container env-page oml-page" id="container-M90002">
    <section class="env-workspace oml-workspace" aria-labelledby="oml-title-M90002">
        <aside class="env-object-panel oml-resource-panel" aria-label="OML4Py resources">
            <header class="env-object-header">
                <div>
                    <h2 class="env-object-title">OML4Py Resources</h2>
                    <p class="env-object-desc">Registered embedded Python scripts.</p>
                </div>
                <div class="env-object-actions">
                    <button type="button" class="env-icon-btn" title="New resource" onclick="M90002.newResource()">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button type="button" class="env-icon-btn env-refresh" title="Refresh resources" onclick="M90002.loadResources()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>
            <div class="env-object-search oml-search-row">
                <input id="resourceSearch-M90002" class="env-search-input" type="search" placeholder="Search resource or script" onkeydown="M90002.handleSearchKey(event)">
                <select id="resourceUseFilter-M90002" class="env-field" onchange="M90002.loadResources()">
                    <option value="ALL">ALL</option>
                    <option value="Y">Y</option>
                    <option value="N">N</option>
                </select>
            </div>
            <div id="resourceGrid-M90002" class="env-tree-grid oml-resource-grid"></div>
        </aside>

        <section class="env-panel oml-detail-panel" aria-labelledby="oml-title-M90002">
            <header class="env-panel-header">
                <div>
                    <h1 class="env-title" id="oml-title-M90002">OML4Py Resource Registry</h1>
                    <p class="env-desc">Register Autonomous Database Embedded Python Execution scripts for Data Work jobs.</p>
                </div>
                <div class="env-actions">
                    <button type="button" class="env-btn" title="Load runnable OML4Py hello sample" onclick="M90002.loadHelloPythonSample()">
                        <i class="fas fa-flask"></i>
                        <span>Python Sample</span>
                    </button>
                    <button type="button" id="saveResource-M90002" class="env-btn env-save" onclick="M90002.saveResource()">
                        <i class="fas fa-save"></i>
                        <span>Save</span>
                    </button>
                    <button type="button" class="env-btn" onclick="M90002.newResource()">New</button>
                    <button type="button" class="env-btn env-danger" onclick="M90002.deleteResource()">Delete</button>
                </div>
            </header>

            <section class="env-meta-grid" aria-label="OML resource metadata">
                <label>
                    <span>Resource ID</span>
                    <input id="resourceId-M90002" class="env-field env-meta-field" type="text" readonly>
                </label>
                <label>
                    <span class="required-title">Resource Name</span>
                    <input id="resourceName-M90002" class="env-field env-meta-field" type="text" placeholder="APR_RULE_MODEL">
                </label>
                <label class="oml-field-wide">
                    <span>Display Label</span>
                    <input id="resourceLabel-M90002" class="env-field env-meta-field" type="text" placeholder="Apriori rule model">
                </label>
                <label>
                    <span>Use</span>
                    <select id="resourceUseYn-M90002" class="env-field env-meta-field">
                        <option value="Y">Y</option>
                        <option value="N">N</option>
                    </select>
                </label>
                <label>
                    <span>Language</span>
                    <select id="resourceLanguage-M90002" class="env-field env-meta-field">
                        <option value="PYTHON">PYTHON</option>
                        <option value="R">R</option>
                    </select>
                </label>
                <label class="oml-field-wide">
                    <span>Resource Type</span>
                    <select id="resourceType-M90002" class="env-field env-meta-field">
                        <option value="SCRIPT">SCRIPT</option>
                        <option value="MODEL">MODEL</option>
                        <option value="NOTEBOOK_JOB">NOTEBOOK_JOB</option>
                        <option value="SERVICE">SERVICE</option>
                    </select>
                </label>
                <label>
                    <span>Exec API</span>
                    <select id="execApi-M90002" class="env-field env-meta-field">
                        <option value="SQL_API">SQL_API</option>
                        <option value="PYTHON_API">PYTHON_API</option>
                        <option value="REST_API">REST_API</option>
                    </select>
                </label>
                <label>
                    <span>Exec Method</span>
                    <select id="execMethod-M90002" class="env-field env-meta-field">
                        <option value="PYQ_TABLE_EVAL">PYQ_TABLE_EVAL</option>
                        <option value="PYQ_EVAL">PYQ_EVAL</option>
                        <option value="PYQ_ROW_EVAL">PYQ_ROW_EVAL</option>
                        <option value="PYQ_GROUP_EVAL">PYQ_GROUP_EVAL</option>
                        <option value="PYQ_INDEX_EVAL">PYQ_INDEX_EVAL</option>
                        <option value="TABLE_APPLY">TABLE_APPLY</option>
                        <option value="DO_EVAL">DO_EVAL</option>
                        <option value="ROW_APPLY">ROW_APPLY</option>
                        <option value="GROUP_APPLY">GROUP_APPLY</option>
                        <option value="INDEX_APPLY">INDEX_APPLY</option>
                    </select>
                </label>
                <label class="oml-field-wide">
                    <span class="required-title">Script Name</span>
                    <input id="scriptName-M90002" class="env-field env-meta-field" type="text" placeholder="SCRIPT_NAME">
                </label>
                <label>
                    <span>Script Owner</span>
                    <input id="scriptOwner-M90002" class="env-field env-meta-field" type="text" placeholder="OWNER">
                </label>
                <label>
                    <span>Input Mode</span>
                    <select id="inputMode-M90002" class="env-field env-meta-field">
                        <option value="TABLE">TABLE</option>
                        <option value="NONE">NONE</option>
                        <option value="ROW">ROW</option>
                        <option value="GROUP">GROUP</option>
                        <option value="INDEX">INDEX</option>
                    </select>
                </label>
                <label class="oml-field-wide">
                    <span>Timeout Sec</span>
                    <input id="timeoutSec-M90002" class="env-field env-meta-field" type="number" min="1" value="300">
                </label>
                <label>
                    <span>Sort</span>
                    <input id="sortOrder-M90002" class="env-field env-meta-field" type="number" value="0">
                </label>
            </section>

            <label class="env-detail-block">
                <span>Description</span>
                <textarea id="description-M90002" class="env-field env-meta-textarea" rows="2"></textarea>
            </label>

            <div class="data-param-script-layout">
                <section class="data-param-panel" aria-label="OML parameters">
                    <header class="data-param-panel-header">
                        <strong>Parameters</strong>
                        <button type="button" class="table-icon-btn" title="Add parameter" onclick="M90002.addParam()">
                            <i class="fas fa-plus"></i>
                        </button>
                    </header>
                    <div id="paramGrid-M90002" class="data-param-grid"></div>
                </section>
                <section class="data-param-panel oml-exec-options-panel" aria-label="OML execution options">
                    <header class="data-param-panel-header">
                        <strong>Execution Options</strong>
                    </header>
                    <label class="env-detail-block">
                        <span>OUT_FMT / Output Format</span>
                        <textarea id="outputFormat-M90002" class="sql-editor data-script-editor" rows="7" spellcheck="false" placeholder="NULL or JSON/table definition for OML SQL API"></textarea>
                    </label>
                    <label class="env-detail-block">
                        <span>Spec JSON</span>
                        <textarea id="specJson-M90002" class="sql-editor data-script-editor" rows="7" spellcheck="false" placeholder="{&quot;notes&quot;:&quot;optional execution metadata&quot;}"></textarea>
                    </label>
                    <label class="env-detail-block">
                        <span>Python Source</span>
                        <textarea id="scriptSource-M90002" class="sql-editor data-script-editor" rows="10" spellcheck="false" placeholder="def hello_world(...):"></textarea>
                    </label>
                </section>
            </div>
        </section>
    </section>
</div>
