<div class="space-y-6 animate-fadeIn">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">위반데이터 검토</h1>
            <p class="text-gray-500 text-sm mt-1">설정된 규칙에 위반된 데이터를 검토하고 조치 사항을 기록합니다.</p>
        </div>
        <div class="flex gap-2">
            <button onclick="M03001.exportViolations()" class="bg-white border border-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50 transition text-gray-700">
                <i class="fas fa-download mr-2"></i>내보내기
            </button>
            <button onclick="M03001.init()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700 transition font-mono">
                <i class="fas fa-sync-alt mr-2"></i>REFRESH
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">전체 위반건수</p>
            <p class="text-2xl font-black text-gray-800 mt-1" id="total-violations">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm border-l-4 border-l-red-500">
            <p class="text-[10px] font-bold text-red-500 uppercase tracking-wider">치명적(Critical)</p>
            <p class="text-2xl font-black text-gray-800 mt-1" id="critical-violations">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm border-l-4 border-l-orange-400">
            <p class="text-[10px] font-bold text-orange-500 uppercase tracking-wider">미결 조치</p>
            <p class="text-2xl font-black text-gray-800 mt-1" id="pending-violations">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm border-l-4 border-l-green-500">
            <p class="text-[10px] font-bold text-green-600 uppercase tracking-wider">해결 완료</p>
            <p class="text-2xl font-black text-gray-800 mt-1" id="resolved-violations">0</p>
        </div>
    </div>

    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-wrap gap-4 items-center">
        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-gray-500 uppercase">심각도</label>
            <select id="severity-filter" onchange="M03001.renderTable()" class="border-gray-300 rounded-lg text-sm border p-1.5 outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="all">전체</option>
                <option value="critical">Critical</option>
                <option value="warning">Warning</option>
                <option value="info">Info</option>
            </select>
        </div>
        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-gray-500 uppercase">상태</label>
            <select id="status-filter" onchange="M03001.renderTable()" class="border-gray-300 rounded-lg text-sm border p-1.5 outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="all">전체</option>
                <option value="pending">조치대기</option>
                <option value="resolved">해결됨</option>
            </select>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold tracking-widest border-b">
                    <tr>
                        <th class="px-6 py-4">심각도</th>
                        <th class="px-6 py-4">규칙 명칭</th>
                        <th class="px-6 py-4">위반 내용 (데이터 ID)</th>
                        <th class="px-6 py-4">발생일시</th>
                        <th class="px-6 py-4">상태</th>
                        <th class="px-6 py-4 text-right">관리</th>
                    </tr>
                </thead>
                <tbody id="violation-tbody" class="text-sm divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
    </div>
</div>
