<div class="space-y-6 animate-fadeIn relative">

    <div class="flex justify-between items-end mb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">종합 컨트롤 예제</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="M00000.downloadExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-green-700 transition-all flex items-center">
                <i class="fas fa-file-excel mr-2"></i>엑셀 다운로드
            </button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">메인 그룹</label>
                <select id="mainCombo" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">선택하세요</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">서브 그룹 (자동 연동)</label>
                <select id="subCombo" class="w-full border-gray-300 rounded-lg p-2.5 border bg-gray-50 outline-none" disabled>
                    <option value="">메인을 먼저 선택하세요</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">검색어</label>
                <input type="text" id="textSearch" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500" placeholder="검색어 입력">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">기준 일자</label>
                <input type="date" id="dateSearch" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-600 mb-2">상태 선택 (다중선택 - IN절 테스트)</label>
                <div class="flex gap-4" id="checkboxArea">
                    <label class="flex items-center gap-2"><input type="checkbox" value="C01" class="status-chk w-4 h-4 text-blue-600"> <span class="text-sm">상태 A</span></label>
                    <label class="flex items-center gap-2"><input type="checkbox" value="C02" class="status-chk w-4 h-4 text-blue-600"> <span class="text-sm">상태 B</span></label>
                </div>
            </div>
            <div class="md:col-span-3">
                <label class="block text-sm font-semibold text-gray-600 mb-2">비고 (Textarea)</label>
                <textarea id="memoArea" rows="2" class="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
        </div>
        
        <div class="mt-6 flex justify-end gap-3 border-t pt-4">
            <button onclick="M00000.executeProcedure()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700">프로시저 호출</button>
            <button onclick="M00000.searchAsync()" class="bg-gray-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-gray-700">비동기 조회</button>
            <button onclick="M00000.searchSync()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">동기식 조회(로딩바)</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 bg-gray-50 border-b font-bold text-gray-700">전체 결과 (No Paging)</div>
            <div class="overflow-y-auto h-64">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-100 text-gray-600 sticky top-0">
                        <tr><th class="p-3">순번</th><th class="p-3">컬럼1</th><th class="p-3">컬럼2</th><th class="p-3">일자</th></tr>
                    </thead>
                    <tbody id="gridNoPaging" class="divide-y divide-gray-100">
                        <tr><td colspan="4" class="p-8 text-center text-gray-400">데이터가 없습니다.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
            <div class="p-4 bg-gray-50 border-b font-bold text-gray-700">페이징 결과 (5건씩)</div>
            <div class="overflow-x-auto flex-1">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-100 text-gray-600">
                        <tr><th class="p-3">순번</th><th class="p-3">컬럼1</th><th class="p-3">컬럼2</th></tr>
                    </thead>
                    <tbody id="gridPaging" class="divide-y divide-gray-100">
                        <tr><td colspan="3" class="p-8 text-center text-gray-400">데이터가 없습니다.</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="p-3 border-t bg-gray-50 flex justify-center gap-2" id="paginationArea">
                </div>
        </div>
    </div>
</div>
