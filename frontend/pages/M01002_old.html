<div id="M01002_wrapper" class="page-container">
    <div class="page-header">
        <h1 class="page-title text-2xl font-bold text-gray-800">메타정보 관리</h1>
        <p class="text-gray-500">데이터셋의 메타데이터를 관리합니다</p>
    </div>

    <div class="dashboard-stats grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="stat-card border-l-4 border-blue-500">
            <div class="flex items-center justify-between">
                <div>
                    <p class="stat-label">전체 데이터셋</p>
                    <h3 class="stat-value text-blue-600" id="total-datasets">0</h3>
                </div>
                <div class="stat-icon bg-blue-50 text-blue-500">
                    <i class="fas fa-database"></i>
                </div>
            </div>
        </div>
        <div class="stat-card border-l-4 border-indigo-500">
            <div class="flex items-center justify-between">
                <div>
                    <p class="stat-label">전체 컬럼</p>
                    <h3 class="stat-value text-indigo-600" id="total-columns">0</h3>
                </div>
                <div class="stat-icon bg-indigo-50 text-indigo-500">
                    <i class="fas fa-columns"></i>
                </div>
            </div>
        </div>
        <div class="stat-card border-l-4 border-green-500">
            <div class="flex items-center justify-between">
                <div>
                    <p class="stat-label">메타데이터 완성도</p>
                    <h3 class="stat-value text-green-600" id="metadata-completeness">0%</h3>
                </div>
                <div class="stat-icon bg-green-50 text-green-500">
                    <i class="fas fa-check-circle"></i>
                </div>
            </div>
        </div>
        <div class="stat-card border-l-4 border-yellow-500">
            <div class="flex items-center justify-between">
                <div>
                    <p class="stat-label">작성 대기</p>
                    <h3 class="stat-value text-yellow-600" id="pending-metadata">0</h3>
                </div>
                <div class="stat-icon bg-yellow-50 text-yellow-500">
                    <i class="fas fa-clock"></i>
                </div>
            </div>
        </div>
    </div>

    <section class="search-section">
        <div class="filter-grid">
            <div class="form-group">
                <label for="input_table_name" class="form-label">테이블명</label>
                <input type="text" id="input_table_name" class="form-control" placeholder="테이블명 입력">
            </div>
            </div>
        <div class="action-bar">
            <button class="btn bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2" onclick="M01002.render()">
                <i class="fas fa-sync-alt"></i> 새로고침
            </button>
            <button id="btn_search_meta" class="btn btn-primary ml-2" onclick="M01002.search()">
                <i class="fas fa-search mr-1"></i> 데이터 조회
            </button>
        </div>
    </section>

    <section class="result-section mt-6">
        <header class="result-header">
            <h4 class="card-title">
                <i class="fas fa-table mr-2 text-blue-500"></i>메타데이터 상세 리스트
            </h4>
        </header>
        <div class="p-4 overflow-x-auto">
            <div id="grid_meta_info"></div>
            
            <table class="w-full text-left hidden">
                <thead>
                    <tr class="text-xs font-semibold text-gray-500 uppercase tracking-wider border-b">
                        <th class="px-4 py-3">ID</th>
                        <th class="px-4 py-3">테이블명</th>
                        <th class="px-4 py-3">논리명</th>
                        <th class="px-4 py-3 text-center">컬럼수</th>
                        <th class="px-4 py-3">설명</th>
                        <th class="px-4 py-3 text-center">관리</th>
                    </tr>
                </thead>
                <tbody id="metadata-tbody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="metadata-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
        <h3 class="text-xl font-bold mb-4 border-b pb-2">메타데이터 상세 정보</h3>
        <div class="space-y-4">
            <div class="form-group">
                <label class="form-label">테이블명</label>
                <input type="text" id="md-table-name" class="form-control mt-1">
            </div>
            <div class="form-group">
                <label class="form-label">논리명</label>
                <input type="text" id="md-logical-name" class="form-control mt-1">
            </div>
            <div class="form-group">
                <label class="form-label">설명</label>
                <textarea id="md-description" class="form-control mt-1" rows="3" style="height: auto;"></textarea>
            </div>
        </div>
        <div class="action-bar border-t mt-6 pt-4 flex justify-end gap-2">
            <button onclick="M01002.closeModal()" class="btn bg-gray-200 hover:bg-gray-300 text-gray-700">취소</button>
            <button onclick="M01002.saveMetadata()" class="btn btn-primary">저장하기</button>
        </div>
    </div>
</div>
