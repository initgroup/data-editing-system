<div class="space-y-6">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">데이터 프로파일링</h1>
            <p class="text-gray-500 text-sm mt-1">데이터 품질을 평가하고 이상치를 탐지합니다</p>
        </div>
        <div class="flex gap-2">
            <button onclick="M01003.runAnalysis()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700 transition-all">
                <i class="fas fa-play mr-2"></i>분석 실행
            </button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
            <i class="fas fa-sliders-h text-blue-500"></i> 프로파일링 설정
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">대상 데이터셋 *</label>
                <select id="dataset-select" class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">데이터셋을 선택하세요</option>
                    <option value="1">고객 데이터 2024 (TB_CUST_INFO)</option>
                    <option value="2">거래 내역 데이터 (TB_ORD_HIST)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">분석 옵션</label>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded border-gray-300">
                        <span class="text-sm text-gray-600 group-hover:text-blue-600">기초 통계량</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded border-gray-300">
                        <span class="text-sm text-gray-600 group-hover:text-blue-600">결측값 분석</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded border-gray-300">
                        <span class="text-sm text-gray-600 group-hover:text-blue-600">이상치 탐지</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-gray-300">
                        <span class="text-sm text-gray-600 group-hover:text-blue-600">데이터 분포</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div id="profiling-dashboard" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="summary-cards"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-bold text-gray-800 mb-4">컬럼별 결측치/이상치 분포</h3>
                <div class="h-72">
                    <canvas id="profilingChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-bold text-gray-800 mb-6">품질 진단 요약</h3>
                <div id="quality-list" class="space-y-6"></div>
            </div>
        </div>
    </div>
</div>
