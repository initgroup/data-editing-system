<div class="page-container home-dashboard-page" id="container-home">
    <div class="local-message-anchor fixed bottom-5 right-5 w-full max-w-md z-[9999] pointer-events-none">
        <div class="local-error-box hidden pointer-events-auto relative border-l-4 p-4 rounded-md shadow-2xl transition-all w-full bg-white">
            <div class="flex items-center pr-8">
                <i class="local-error-icon fas fa-exclamation-circle mr-3 text-lg"></i>
                <p class="local-error-text text-sm font-bold"></p>
            </div>
            <button onclick="CommonUI.hidePageMessage('home');" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600" title="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <section class="home-hero-panel">
        <div class="home-hero-main">
            <p class="home-kicker">INIT Data Editing System</p>
            <h2 id="homeGreeting">Data editing workspace</h2>
            <p id="homeContextSummary" class="home-context-summary"></p>
        </div>
        <div class="home-session-strip">
            <div>
                <span>User</span>
                <strong id="homeUserName">-</strong>
            </div>
            <div>
                <span>Role</span>
                <strong id="homeUserRole">-</strong>
            </div>
            <div>
                <span>Target DB</span>
                <strong id="homeTargetDb">Not selected</strong>
            </div>
        </div>
    </section>

    <section class="home-dashboard-grid">
        <div class="home-panel home-panel-wide">
            <div class="home-panel-header">
                <div>
                    <h3>Workflow Readiness</h3>
                    <p>최근 7일 자동규칙발굴, 규칙위반탐지, 통합시나리오 실행 추이</p>
                </div>
                <span class="home-panel-actions">
                    <button type="button" id="homeRefreshWorkflowButton" class="home-icon-button" title="Refresh workflow readiness">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button type="button" id="homeOpenFlowButton" class="home-icon-button" title="Open integrated flow">
                        <i class="fas fa-diagram-project"></i>
                    </button>
                </span>
            </div>
            <div class="home-chart-box home-rule-chart-box">
                <canvas id="homeRuleTrendChart"></canvas>
            </div>
        </div>

        <div class="home-panel">
            <div class="home-panel-header">
                <div>
                    <h3>Quality Signal</h3>
                    <p>최근 알림 메시지</p>
                </div>
                <span class="home-panel-actions">
                    <button type="button" id="homeOpenNoticeListButton" class="home-icon-button" title="Open all notices">
                        <i class="fas fa-list"></i>
                    </button>
                    <button type="button" id="homeRefreshQualityButton" class="home-icon-button" title="Refresh quality signal">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </span>
            </div>
            <div class="home-alert-list" id="homeAlertList"></div>
        </div>
    </section>

    <div id="homeNoticeLayer" class="data-help-layer home-notice-layer" hidden>
        <section class="data-help-dialog home-notice-dialog" role="dialog" aria-modal="true" aria-labelledby="homeNoticeTitle">
            <header>
                <h2 id="homeNoticeTitle">Notices</h2>
                <button type="button" class="table-icon-btn" title="Close" onclick="home.closeNoticeLayer()">
                    <i class="fas fa-times"></i>
                </button>
            </header>
            <div class="home-notice-browser">
                <aside class="home-notice-browser-list" id="homeNoticeBrowserList"></aside>
                <article class="home-notice-browser-detail">
                    <h3 id="homeNoticeDetailTitle">Notice</h3>
                    <div id="homeNoticeMeta" class="flow-run-plan-summary"></div>
                    <div id="homeNoticeBody" class="home-notice-body"></div>
                </article>
            </div>
            <footer>
                <button type="button" class="env-btn" onclick="home.closeNoticeLayer()">Close</button>
            </footer>
        </section>
    </div>

    <section class="home-link-banner" id="homeLinkBanner" aria-label="Main shortcuts"></section>

    <a class="home-company-banner" href="https://initgroup.kr/" target="_blank" rel="noopener noreferrer" aria-label="Open iNiT homepage">
        <img src="/assets/init-logo.png" alt="iNiT">
        <span>인아이티 홈페이지</span>
        <i class="fas fa-arrow-up-right-from-square"></i>
    </a>

    <footer class="home-footer">
        <span>Copyright &copy; 2026 iNiT. All rights reserved.</span>
    </footer>
</div>
