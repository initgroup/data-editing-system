<div class="page-container env-page scenario-page" id="container-M01002">
    <section class="env-workspace" aria-labelledby="scenario-title-M01002">
        <aside class="env-object-panel">
            <header class="env-object-header">
                <div>
                    <h2 class="env-section-title">Project List</h2>
                    <p class="env-section-desc">Select a project to manage scenarios.</p>
                </div>
                <div class="env-object-actions">
                    <button type="button" class="env-icon-btn env-refresh" title="Refresh projects" onclick="M01002.loadProjects()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <div class="env-object-search">
                <i class="fas fa-search"></i>
                <input
                    id="projectSearch-M01002"
                    type="search"
                    placeholder="Search project"
                    aria-label="Search project"
                    oninput="M01002.handleProjectSearchInput()"
                    onkeydown="M01002.handleProjectSearchKey(event)"
                >
                <div class="env-search-actions">
                    <button type="button" class="env-icon-btn" title="Search" onclick="M01002.loadProjects()">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div id="projectList-M01002" class="env-tree-grid project-list" aria-label="Registered projects"></div>

            <section class="env-object-meta scenario-project-summary scenario-side-summary" aria-label="Selected project">
                <div class="env-meta-grid scenario-project-grid">
                    <label>
                        <span>Project ID</span>
                        <input id="selectedProjectId-M01002" class="env-field env-meta-field" type="text" readonly>
                    </label>
                    <label>
                        <span>Project Code</span>
                        <input id="selectedProjectCode-M01002" class="env-field env-meta-field" type="text" readonly>
                    </label>
                    <label class="env-meta-wide">
                        <span>Project Name</span>
                        <input id="selectedProjectName-M01002" class="env-field env-meta-field" type="text" readonly>
                    </label>
                </div>
            </section>
        </aside>

        <section class="env-panel" aria-labelledby="scenario-title-M01002">
            <header class="env-header">
                <h1 class="env-title" id="scenario-title-M01002">Scenario Definition</h1>
                <p class="env-desc" id="scenarioDescription-M01002">
                    Select a project and register scenarios for it.
                </p>
            </header>

            <section class="scenario-list-panel" aria-label="Scenario list">
                <div class="scenario-list-toolbar">
                    <div class="env-object-search scenario-search">
                        <i class="fas fa-search"></i>
                        <input
                            id="scenarioSearch-M01002"
                            type="search"
                            placeholder="Search scenario"
                            aria-label="Search scenario"
                            oninput="M01002.handleScenarioSearchInput()"
                            onkeydown="M01002.handleScenarioSearchKey(event)"
                        >
                        <div class="env-search-actions">
                            <button type="button" class="env-icon-btn" title="Search" onclick="M01002.loadScenarios()">
                                <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="env-btn env-cancel scenario-new-btn" onclick="M01002.newScenario()">
                        <i class="fas fa-plus"></i>
                        <span>New scenario</span>
                    </button>
                </div>
                <div id="scenarioList-M01002" class="scenario-list" aria-label="Scenarios"></div>
            </section>

            <section class="env-object-meta scenario-detail" aria-label="Scenario detail">
                <div class="env-meta-grid scenario-meta-grid">
                    <label>
                        <span>Scenario ID</span>
                        <input id="scenarioId-M01002" class="env-field env-meta-field" type="text" readonly>
                    </label>
                    <label>
                        <span>Use</span>
                        <select id="scenarioUseYn-M01002" class="env-field env-meta-field" onchange="M01002.updateField('useYn', this.value)">
                            <option value="Y">Y</option>
                            <option value="N">N</option>
                        </select>
                    </label>
                    <label>
                        <span>Sort</span>
                        <input id="scenarioSortOrder-M01002" class="env-field env-meta-field" type="number" oninput="M01002.updateField('sortOrder', this.value)">
                    </label>
                    <label class="env-meta-wide">
                        <span class="required-title">Scenario Name</span>
                        <input id="scenarioName-M01002" class="env-field env-meta-field" type="text" oninput="M01002.updateField('scenarioName', this.value)">
                    </label>
                    <label>
                        <span class="project-label-line">
                            <span class="required-title">Scenario Code</span>
                            <button
                                type="button"
                                class="project-help-btn"
                                title="Scenario code help"
                                aria-label="Scenario code help"
                                aria-expanded="false"
                                onclick="M01002.toggleScenarioCodeHelp(event)"
                            >
                                <i class="far fa-circle-question"></i>
                            </button>
                        </span>
                        <span id="scenarioCodeHelp-M01002" class="project-help-layer" role="tooltip" hidden>
                            <strong>Scenario Code</strong>
                            <span>선택한 프로젝트 안에서 시나리오를 구분하는 고유 키입니다. 규칙, 검증, 정제 단계를 식별할 수 있는 짧은 영문 코드로 관리하세요.</span>
                            <em>예: RULE_MISSING_CHECK, CLEAN_CUSTOMER_NAME</em>
                        </span>
                        <input id="scenarioCode-M01002" class="env-field env-meta-field" type="text" oninput="M01002.updateField('scenarioCode', this.value)">
                    </label>
                    <label>
                        <span>Scenario Type</span>
                        <select id="scenarioType-M01002" class="env-field env-meta-field" onchange="M01002.updateField('scenarioType', this.value)">
                            <option value="RULE">Rule</option>
                            <option value="VALIDATION">Validation</option>
                            <option value="CLEANING">Cleaning</option>
                            <option value="ANALYSIS">Analysis</option>
                        </select>
                    </label>
                    <label class="env-meta-wide">
                        <span>Description</span>
                        <textarea id="scenarioDesc-M01002" class="env-field env-meta-textarea" rows="4" oninput="M01002.updateField('scenarioDesc', this.value)"></textarea>
                    </label>
                </div>
            </section>

            <footer class="env-footer">
                <div class="env-footer-group">
                    <span class="env-detail-hint">Scenario code is unique inside the selected project.</span>
                </div>
                <div class="env-footer-group">
                    <button type="button" class="env-btn env-save" onclick="M01002.saveScenario()">
                        <span>Save scenario</span>
                    </button>
                    <button type="button" class="env-btn env-cancel" onclick="M01002.resetScenario()">Cancel</button>
                    <button type="button" class="env-btn env-danger" onclick="M01002.deleteScenario()">
                        <i class="far fa-trash-alt"></i>
                        <span>Delete scenario</span>
                    </button>
                    <button type="button" class="env-btn env-danger" onclick="M01002.deleteAllScenarios()">
                        <i class="fas fa-trash-can"></i>
                        <span>Delete all</span>
                    </button>
                </div>
            </footer>
        </section>
    </section>
</div>
