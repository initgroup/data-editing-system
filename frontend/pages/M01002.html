<div class="space-y-6">
    <div class="content-header mb-6">
        <h1 class="text-2xl font-bold text-gray-800">메타정보 관리</h1>
        <p class="text-gray-500">데이터셋의 메타데이터를 관리합니다</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">메타데이터 요약</h2>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm flex items-center gap-2" onclick="refreshMetadata()">
                <i class="fas fa-sync-alt"></i> 새로고침
            </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 text-center">
                <div class="text-2xl font-bold text-blue-600" id="total-datasets">0</div>
                <div class="text-xs text-blue-500 font-medium uppercase">전체 데이터셋</div>
            </div>
            <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-100 text-center">
                <div class="text-2xl font-bold text-indigo-600" id="total-columns">0</div>
                <div class="text-xs text-indigo-500 font-medium uppercase">전체 컬럼</div>
            </div>
            <div class="bg-green-50 p-4 rounded-lg border border-green-100 text-center">
                <div class="text-2xl font-bold text-green-600" id="metadata-completeness">0%</div>
                <div class="text-xs text-green-500 font-medium uppercase">메타데이터 완성도</div>
            </div>
            <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-100 text-center">
                <div class="text-2xl font-bold text-yellow-600" id="pending-metadata">0</div>
                <div class="text-xs text-yellow-500 font-medium uppercase">작성 대기</div>
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">메타데이터 목록</h2>
            <button onclick="openMetadataModal()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm">
                <i class="fas fa-plus mr-1"></i> 신규 등록
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs border-y">
                    <tr>
                        <th class="px-4 py-3">번호</th>
                        <th class="px-4 py-3">테이블명</th>
                        <th class="px-4 py-3">논리명</th>
                        <th class="px-4 py-3 text-center">컬럼수</th>
                        <th class="px-4 py-3">설명</th>
                        <th class="px-4 py-3 text-center">작업</th>
                    </tr>
                </thead>
                <tbody id="metadata-tbody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="metadata-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
        <h3 class="text-xl font-bold mb-4">메타데이터 관리</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">테이블명</label>
                <input type="text" id="md-table-name" class="w-full border-gray-300 rounded-lg p-2 border mt-1">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">논리명</label>
                <input type="text" id="md-logical-name" class="w-full border-gray-300 rounded-lg p-2 border mt-1">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">설명</label>
                <textarea id="md-description" class="w-full border-gray-300 rounded-lg p-2 border mt-1" rows="3"></textarea>
            </div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeMetadataModal()" class="px-4 py-2 bg-gray-200 rounded-lg font-medium">취소</button>
            <button onclick="saveMetadata()" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">저장</button>
        </div>
    </div>
</div>
