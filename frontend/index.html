        #contentBodyWrapper { 
            min-width: 800px; /* 본문이 깨지지 않는 최소 가로 폭 설정 */
        }
    </style>
</head>

    <script src="./js/app.js"></script>
    <script src="./js/gridjs.umd.js"></script>
    <!-- <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script> -->
    <script src="./js/common.js"></script>
    <!--     <script src="./js/main.js"></script>    -->
    <script src="./js/chart.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->   
    <script>
        // 1. 폴더 열고 닫기 (아코디언) 로직
        document.querySelectorAll('.menu-folder button').forEach(button => {
            button.addEventListener('click', (e) => {
                const submenu = button.nextElementSibling;
                const icon = button.querySelector('svg');
                
                // 다른 폴더를 닫고 싶다면 아래 코드를 활성화하세요 (선택 사항)
                document.querySelectorAll('.submenu').forEach(s => { if(s !== submenu) s.classList.add('hidden'); });

                submenu.classList.toggle('hidden');
                if (icon) {
                    icon.classList.toggle('rotate-180');
                }

                // [추가] 모바일에서 폴더 클릭 시 페이지가 바뀐다면 사이드바를 닫아줌
                if (window.innerWidth <= 1024) {
                    LayoutManager.close(); 
                }
            });
        });

        // 2. 메뉴 클릭 시 PageManager 호출
        // 하위 메뉴(a) 뿐만 아니라 폴더(button)에도 이벤트를 걸어줍니다.
        document.querySelectorAll('#mainNav a, #mainNav button[data-page]').forEach(link => {
            link.addEventListener('click', handleMenuClick);
        });

        // 1. 공통 메뉴 클릭 핸들러 함수 정의
        function handleMenuClick(e) {
            e.preventDefault();
            
            // 클릭된 요소가 a인지 button인지 확인하여 가장 가까운 요소 선택
            const target = e.currentTarget; 
            const page = target.dataset.page;

            // [추가] 만약 클릭한 게 '버튼(폴더)'라면?
            if (target.tagName === 'BUTTON') {
                // 바로 다음에 오는 서브메뉴 그룹(.submenu) 내의 첫 번째 <a> 태그를 찾습니다.
                const firstSubMenu = target.nextElementSibling?.querySelector('a');
                
                if (firstSubMenu) {
                    // 하위 메뉴가 있다면 해당 메뉴를 클릭한 것처럼 시뮬레이션하고 함수 종료
                    firstSubMenu.click(); 
                    return; // 버튼 자체의 로직은 여기서 중단 (이후 a태그 로직이 다시 실행됨)
                }
            }
            
            // 1-1. 제목 설정 (let 사용)
            let title = target.innerText.trim();
            if (page === 'home') {
                title = '인아이티 Data Editing 시스템';
            }

            if (page) {
                // 1-2. 페이지 로드
                PageManager.load(page, title);

                // 3. 배경색(활성화) 스타일 처리
                // 모든 메뉴에서 일단 제거
                document.querySelectorAll('#mainNav a, #mainNav button').forEach(el => {
                    el.classList.remove('menu-active', 'bg-blue-700');
                });
                
                // [수정 핵심] 클릭한 요소가 'A' 태그(하위 메뉴)일 때만 배경색 추가
                // 폴더(Button)를 눌렀을 때는 페이지는 이동하되 배경은 변하지 않음
                if (target.tagName === 'A') {
                    target.classList.add('menu-active', 'bg-blue-700');
                }

                // 4. 모바일에서 사이드바 닫기
                if (window.innerWidth <= 1024 && typeof LayoutManager !== 'undefined') {
                    LayoutManager.close(); 
                }
            }
        }
    </script>
