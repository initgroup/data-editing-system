    <style>
        .menu-active { @apply bg-blue-700 border-l-4 border-yellow-400; }
        .submenu { transition: all 0.3s ease-in-out; }
        
        /* 사이드바 애니메이션 및 상태 */
        #sidebar { transition: width 0.3s ease; overflow-x: hidden; }
        .sidebar-collapsed { width: 60px !important; }
        .sidebar-collapsed .menu-text, 
        .sidebar-collapsed .menu-folder span,
        .sidebar-collapsed .fa-chevron-down,
        .sidebar-collapsed .logo-text { display: none; }
        .sidebar-collapsed .menu-item-content { justify-content: center; }

        /* 본문 가로 스크롤 방지 및 최소 너비 */
        main { min-width: 0; flex: 1; }
        #contentBodyWrapper { 
            min-width: 800px; /* 본문이 깨지지 않는 최소 가로 폭 설정 */
        }
    </style>
</head>
<body class="flex h-screen bg-gray-100 overflow-hidden">
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-4 text-xl font-bold border-b border-slate-700">Data Editing</div>
        
        <nav class="flex-1 overflow-y-auto py-4 space-y-1" id="mainNav">
            <a href="#" data-page="home" class="block p-3 hover:bg-slate-700 menu-active flex items-center gap-2">
                <span>🏠</span> 메인홈
            </a>

            <div class="menu-folder">
                <button class="w-full flex items-center justify-between p-3 hover:bg-slate-800 transition-colors group" onclick="loadPage('M01001','🔍 데이터 탐색');">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-database text-yellow-500"></i> <span>데이터 준비</span>
                    </div>
                    <i class="fas fa-chevron-down text-xs transition-transform duration-300"></i>
                </button>
                <div class="submenu bg-slate-800 hidden">
                    <a href="#" data-page="M01001" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">🔍 데이터 탐색</a>
                    <a href="#" data-page="M01002" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">📋 메타정보</a>
                    <a href="#" data-page="M01003" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">📊 프로파일링</a>
                </div>
            </div>

            <div class="menu-folder">
                <button class="w-full flex items-center justify-between p-3 hover:bg-slate-800 transition-colors group" onclick="loadPage('M02001','💡 규칙발굴');">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-filter-circle-dollar text-yellow-500"></i></i> <span>규칙 관리</span>
                    </div>
                    <i class="fas fa-chevron-down text-xs transition-transform duration-300"></i>
                </button>
                <div class="submenu bg-slate-800 hidden">
                    <a href="#" data-page="M02001" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">💡 규칙발굴</a>
                    <a href="#" data-page="M02002" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">📉 시각화분석</a>
                    <a href="#" data-page="M02003" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">✅ 규칙확정</a>
                </div>
            </div>

            <div class="menu-folder">
                <button class="w-full flex items-center justify-between p-3 hover:bg-slate-800 transition-colors group" onclick="loadPage('M03001','⚠️ 위반데이터 검토');">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-microchip text-yellow-500"></i> <span>에디팅</span>
                    </div>
                    <i class="fas fa-chevron-down text-xs transition-transform duration-300"></i>
                </button>
                <div class="submenu bg-slate-800 hidden">
                    <a href="#" data-page="M03001" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">⚠️ 위반데이터 검토</a>
                    <a href="#" data-page="M03002" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">⚖️ 에디팅판단</a>
                    <a href="#" data-page="M03003" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">🔄 반영 및 검증</a>
                </div>
            </div>

            <div class="menu-folder">
                <button class="w-full flex items-center justify-between p-3 hover:bg-slate-800 transition-colors group" onclick="loadPage('M04001','📝 보고서 목록');">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-file-lines text-yellow-500"></i> <span>보고서</span>
                    </div>
                    <i class="fas fa-chevron-down text-xs transition-transform duration-300"></i>
                </button>
                <div class="submenu bg-slate-800 hidden">
                    <a href="#" data-page="M04001" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">📝 보고서 목록</a>
                </div>
            </div>

            <div class="menu-folder">
                <button class="w-full flex items-center justify-between p-3 hover:bg-slate-800 transition-colors group" onclick="loadPage('M05001','⚙️ 환경 설정');">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-user-gear text-yellow-500"></i> <span>설정</span>
                    </div>
                    <i class="fas fa-chevron-down text-xs transition-transform duration-300"></i>
                </button>
                <div class="submenu bg-slate-800 hidden">
                    <a href="#" data-page="M05001" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">⚙️ 환경 설정</a>
                </div>

            <div class="menu-folder">
                <button class="w-full flex items-center justify-between p-3 hover:bg-slate-800 transition-colors group" onclick="loadPage('M00000','⚙️ 테스트');">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-user-gear text-yellow-500"></i> <span>샘플 페이지</span>
                    </div>
                    <i class="fas fa-chevron-down text-xs transition-transform duration-300"></i>
                </button>
                <div class="submenu bg-slate-800 hidden">
                    <a href="#" data-page="M00000" class="block p-3 pl-10 hover:bg-slate-700 text-sm text-slate-300">⚙️ 테스트</a>
                </div>

        </nav>

    <main class="flex-1 flex flex-col overflow-hidden relative">
    
        <div id="customLoadingBar" class="hidden fixed inset-0 bg-gray-900/50 z-[9999] flex flex-col items-center justify-center">
            <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center">
                <div class="relative w-16 h-16">
                    <div class="absolute inset-0 border-4 border-blue-200 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
                </div>
                <p class="text-lg font-bold text-gray-700 mt-4">데이터 처리 중...</p>
            </div>
        </div>

        <header class="h-14 bg-white shadow-sm flex items-center px-6 font-semibold text-lg shrink-0" id="contentTitle">
            메인홈
        </header>

        <section id="contentBody" class="flex-1 p-6 overflow-y-auto">
            
            <div id="errorBox" class="hidden relative border-l-4 p-4 rounded-md shadow-sm transition-all animate-slideIn w-full">
                <div class="flex items-center pr-8">
                    <i id="errorIcon" class="fas fa-exclamation-circle mr-3 text-lg"></i>
                    <p id="errorMsgText" class="text-sm font-bold"></p>
                </div>
                <button onclick="hideMessage()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div id="contentBody">
                <div class="bg-white p-10 rounded-lg shadow">환영합니다! 메뉴를 선택해 주세요.</div>
            </div>

        </section>
    </main>
    <script>
        // 1. 폴더 열고 닫기 (아코디언) 로직
        document.querySelectorAll('.menu-folder button').forEach(button => {
            button.addEventListener('click', (e) => {
                const submenu = button.nextElementSibling;
                const icon = button.querySelector('svg');
                
                // 다른 폴더를 닫고 싶다면 아래 코드를 활성화하세요 (선택 사항)
                // document.querySelectorAll('.submenu').forEach(s => { if(s !== submenu) s.classList.add('hidden'); });

                submenu.classList.toggle('hidden');
                if (icon) {
                    icon.classList.toggle('rotate-180');
                }
            });
        });

        // 2. 메뉴 클릭 시 페이지 로드 로직
        document.querySelectorAll('#mainNav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const aTag = e.target.closest('a');
                const page = aTag.dataset.page;
                const title = aTag.innerText;

                if (page) {
                    loadPage(page, title);
                    
                    // 활성화 스타일 관리
                    document.querySelectorAll('#mainNav a').forEach(a => a.classList.remove('menu-active', 'bg-blue-700'));
                    aTag.classList.add('menu-active', 'bg-blue-700');
                }
            });
        });

        // 3. [핵심] HTML과 JS를 동시에 로드하는 함수
        // [수정된 loadPage 함수]
        async function loadPage(page, title) {
            const body = document.getElementById('contentBody');
            const titleEl = document.getElementById('contentTitle');
            
            titleEl.innerText = title;
            body.innerHTML = `<div class='flex justify-center p-10'><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>`;
            
            try {
                const htmlRes = await fetch(`./pages/${page}.html`);
                if (!htmlRes.ok) throw new Error('HTML 로드 실패');
                const htmlText = await htmlRes.text();
                
                // 1. HTML 삽입 (DOM 생성)
                body.innerHTML = htmlText;

                // 2. 스크립트 교체
                const oldScript = document.getElementById('page-script');
                if (oldScript) oldScript.remove();

                const script = document.createElement('script');
                script.id = 'page-script';
                script.src = `./js/${page}.js?v=${Date.now()}`; 
                
                // 3. 스크립트 로드 완료 후 실행 보장
                script.onload = () => {
                    console.log(`[System] ${page} script loaded.`);
                    // 요소가 있는지 확인 후 초기화 함수 실행
                    // window[함수명] 패턴으로 안전하게 호출
                    const initFuncName = `init${page}Page`; 
                    if (typeof window[initFuncName] === 'function') {
                        window[initFuncName]();
                    } else if (typeof window.initMetadataPage === 'function' && page === 'M01002') {
                        // 특정 페이지 예외 처리 혹은 공통 인터페이스 사용
                        window.initMetadataPage();
                    }
                };

                document.body.appendChild(script);

            } catch (e) {
                body.innerHTML = `<div class="p-10 text-red-500 bg-red-50 rounded-lg">
                    <i class="fas fa-exclamation-triangle mr-2"></i>화면을 불러오지 못했습니다: ${e.message}
                </div>`;
            }
        }

        loadPage('home',`인아이티 Data Editing 시뮬레이션 방문을 환영합니다.`);
    </script>

</body>
</html>
