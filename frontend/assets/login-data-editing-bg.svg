<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="Data editing workflow background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06142f"/>
      <stop offset="0.5" stop-color="#073b82"/>
      <stop offset="1" stop-color="#0b6fbd"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#7dd3fc" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#bfdbfe" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#93c5fd" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#7dd3fc" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#grid)"/>
  <circle cx="1060" cy="160" r="360" fill="url(#glow)" opacity="0.24"/>
  <circle cx="420" cy="760" r="420" fill="url(#glow)" opacity="0.14"/>

  <g opacity="0.38" fill="none" stroke="#7dd3fc" stroke-width="2">
