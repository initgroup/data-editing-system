<!DOCTYPE html>
<html lang="en" data-ai-document="menu-help" data-context-priority="highest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Help - INIT Data Editing System</title>
    <meta name="ai-context-kind" content="menu-help">
    <meta name="ai-context-priority" content="highest">
    <script src="../js/cache-version-utils.js"></script>
    <script src="./help-utils.js"></script>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, "Malgun Gothic", sans-serif;
        }

        body {
            background: #f8fafc;
            color: #0f172a;
            margin: 0;
        }

        header {
            background: #111827;
            color: #f8fafc;
            padding: 26px 34px;
        }

        main {
            display: grid;
            gap: 18px;
            margin: 0 auto;
            max-width: 1080px;
            padding: 24px 34px 40px;
        }

        h1,
        h2,
        h3,
        p {
            margin-top: 0;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        header p {
            color: #cbd5e1;
            line-height: 1.6;
            margin: 0;
        }

        .meta {
            color: #93a4bd;
            display: flex;
            flex-wrap: wrap;
            font-size: 12px;
            gap: 8px;
            margin-top: 12px;
        }

        .meta span {
            border: 1px solid #334155;
            padding: 4px 8px;
        }

        section {
            background: #ffffff;
            border: 1px solid #dbe3ef;
            padding: 18px;
        }

        .ai-note {
            background: #ecfdf5;
            border-color: #99f6e4;
        }

        .warning-note {
            background: #fff7ed;
            border-color: #fed7aa;
        }

        h2 {
            border-bottom: 1px solid #e2e8f0;
            font-size: 18px;
            margin-bottom: 12px;
            padding-bottom: 8px;
        }

        h3 {
            font-size: 14px;
            margin-bottom: 6px;
        }

        p,
        li,
        dd {
            color: #334155;
            font-size: 14px;
            line-height: 1.65;
        }

        ul,
        ol {
            margin-bottom: 0;
            padding-left: 22px;
        }

        dl {
            display: grid;
            gap: 10px;
            margin: 0;
        }

        dt {
            color: #0f172a;
            font-size: 14px;
            font-weight: 800;
        }

        dd {
            margin: 2px 0 0;
        }

        code {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #1d4ed8;
            padding: 1px 4px;
        }

        .grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .full {
            grid-column: 1 / -1;
        }

        .cache-version-table {
            border-collapse: collapse;
            font-size: 12px;
            width: 100%;
        }

        .cache-version-table th,
        .cache-version-table td {
            border-bottom: 1px solid #e2e8f0;
            padding: 7px 8px;
            text-align: left;
            vertical-align: top;
        }

        .cache-version-table th {
            background: #f8fafc;
            color: #475569;
            font-weight: 800;
        }

        .cache-version-table code {
            color: #0f172a;
            word-break: break-all;
        }

        .cache-version-source {
            color: #64748b;
            white-space: nowrap;
        }

        @media (max-width: 760px) {
            header,
            main {
                padding-left: 18px;
                padding-right: 18px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1 id="helpTitle">Menu Help</h1>
        <p id="helpSummary">Loading help content.</p>
        <div class="meta" id="helpMeta"></div>
    </header>

    <main id="helpMain" data-ai-section="menu-help"></main>

    <script>
        const HELP_UI = {
            en: {
                language: "en",
                helpWord: "Help",
                loadingTitle: "Menu Help",
                loadingSummary: "Loading help content.",
                loadFailed: "Unable to load help content",
                noList: "No description is registered.",
                noDefinition: "No layout information is registered.",
                sectionTitles: {
                    summary: "Menu Summary",
                    purpose: "Screen Purpose",
                    workflow: "Default Workflow",
                    layout: "Screen Layout",
                    controls: "Main Buttons / Actions",
                    aiGuidance: "Answering Guidelines",
                    implementation: "Implementation Links",
                    sqlPurpose: "SQL Roles",
                    logicalData: "Logical Data Domains",
                    publicModels: "Model / AI Resource Scope",
                    privacy: "Privacy Rule",
                    cache: "Current File Cache Versions"
                },
                optionalTitles: {
                    deepDive: "Detailed Guide",
                    interpretationGuide: "Result Interpretation",
                    troubleshooting: "Common Checks",
                    implementationNotes: "Implementation Notes"
                },
                meta: {
                    menuCode: "Menu code",
                    group: "Group",
                    status: "Status"
                },
                implementation: {
                    frontendHtml: "Screen HTML",
                    frontendJs: "Screen JS",
                    backendRouter: "API router",
                    commonService: "Common service",
                    sqlTemplate: "SQL template",
                    noRouter: "No registered API router or planned implementation",
                    noService: "None or handled by the screen router"
                },
                publicModelsFallback: "Model and AI details are described only at a public conceptual level.",
                privacyFallback: "Help pages do not expose physical table names, internal procedure names, DB connection details, API keys, or passwords.",
                cache: {
                    intro: "The base version is {version}; file-specific overrides take precedence when configured.",
                    columns: ["Type", "File", "Applied version", "Source"],
                    unknown: "unknown",
                    assets: {
                        shellJs: "Shell JS",
                        commonJs: "Common JS",
                        menuConfig: "Menu config",
                        menuRenderer: "Menu renderer",
                        helpPopup: "Help popup",
                        helpUtility: "Help utility",
                        helpContent: "Help content",
                        currentMenuHtml: "Current menu HTML",
                        currentMenuJs: "Current menu JS",
                        dataTemplateJs: "Data work template JS",
                        flowTemplateJs: "Flow work template JS",
                        analysisTemplateJs: "Analysis work template JS"
                    }
                }
            },
            ko: {
                language: "ko",
                helpWord: "도움말",
                loadingTitle: "메뉴 도움말",
                loadingSummary: "도움말 정보를 불러오는 중입니다.",
                loadFailed: "도움말을 불러오지 못했습니다",
                noList: "등록된 설명이 없습니다.",
                noDefinition: "등록된 구성 정보가 없습니다.",
                sectionTitles: {
                    summary: "메뉴 요약",
                    purpose: "화면 목적",
                    workflow: "기본 업무 흐름",
                    layout: "화면 구성",
                    controls: "주요 버튼/동작",
                    aiGuidance: "질문 답변 참고 기준",
                    implementation: "구현 연동",
                    sqlPurpose: "SQL 역할",
                    logicalData: "논리 데이터 도메인",
                    publicModels: "모델/AI 리소스 안내 범위",
                    privacy: "비공개 원칙",
                    cache: "현재 파일 캐시 버전"
                },
                optionalTitles: {
                    deepDive: "상세 이해 가이드",
                    interpretationGuide: "결과 해석 기준",
                    troubleshooting: "자주 확인할 문제",
                    implementationNotes: "구현 보충 설명"
                },
                meta: {
                    menuCode: "메뉴 코드",
                    group: "그룹",
                    status: "상태"
                },
                implementation: {
                    frontendHtml: "화면 HTML",
                    frontendJs: "화면 JS",
                    backendRouter: "API 라우터",
                    commonService: "공통 서비스",
                    sqlTemplate: "SQL 템플릿",
                    noRouter: "등록된 API 라우터 없음 또는 구현 예정",
                    noService: "없음 또는 화면 전용 라우터에서 직접 처리"
                },
                publicModelsFallback: "이 메뉴에서 안내할 모델/AI 리소스 정보는 별도 공개 범위가 확인될 때만 제공합니다.",
                privacyFallback: "도움말은 실제 물리 테이블명, 내부 프로시저명, DB 접속 정보, API Key, 비밀번호를 공개하지 않고 논리 도메인명과 파일/템플릿 연결만 설명합니다.",
                cache: {
                    intro: "기본 버전은 {version}이며, 파일별 override가 있으면 해당 버전이 우선 적용됩니다.",
                    columns: ["구분", "파일", "적용 버전", "출처"],
                    unknown: "unknown",
                    assets: {
                        shellJs: "Shell JS",
                        commonJs: "Common JS",
                        menuConfig: "Menu config",
                        menuRenderer: "Menu renderer",
                        helpPopup: "Help popup",
                        helpUtility: "Help utility",
                        helpContent: "Help content",
                        currentMenuHtml: "Current menu HTML",
                        currentMenuJs: "Current menu JS",
                        dataTemplateJs: "Data work template JS",
                        flowTemplateJs: "Flow work template JS",
                        analysisTemplateJs: "Analysis work template JS"
                    }
                }
            }
        };

        let currentHelpLanguage = "en";
        let currentHelpText = HELP_UI.en;
        let currentHelpContentPath = "./help-content.en.json";

        function normalizeHelpLanguage(value) {
            return window.HelpContentUtils?.normalizeLanguageCode?.(value) || (String(value || "").toLowerCase().startsWith("ko") ? "ko" : "en");
        }

        function resolveHelpLanguage(params) {
            const paramLanguage = normalizeHelpLanguage(params.get("lang") || params.get("language"));
            if (params.get("lang") || params.get("language")) return paramLanguage;

            try {
                const openerLanguage = window.opener?.I18nManager?.getCurrentLanguage?.();
                if (openerLanguage) return normalizeHelpLanguage(openerLanguage);
            } catch (error) {
                // Cross-window access can fail if the opener changed origin.
            }

            const storedLanguage = sessionStorage.getItem("initLanguageCode");
            return storedLanguage ? normalizeHelpLanguage(storedLanguage) : "en";
        }

        function getHelpContentPath(languageCode) {
            return normalizeHelpLanguage(languageCode) === "ko" ? "./help-content.json" : "./help-content.en.json";
        }

        async function fetchHelpContent(path) {
            const url = window.AssetCacheVersionUtils.getAssetUrl(path);
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderList(items) {
            const list = (items || []).filter(Boolean);
            if (!list.length) return `<p>${escapeHtml(currentHelpText.noList)}</p>`;
            return `<ul>${list.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
        }

        function renderDefinitionList(items) {
            const list = (items || []).filter(Boolean);
            if (!list.length) return `<p>${escapeHtml(currentHelpText.noDefinition)}</p>`;
            return `<dl>${list.map((item) => `
                <div>
                    <dt>${escapeHtml(item.name)}</dt>
                    <dd>${escapeHtml(item.description)}</dd>
                </div>
            `).join("")}</dl>`;
        }

        function renderImplementation(implementation) {
            const ui = currentHelpText.implementation;
            const serviceFiles = implementation.serviceFiles.length ? implementation.serviceFiles : [ui.noService];
            const rows = [
                [ui.frontendHtml, implementation.frontendHtml],
                [ui.frontendJs, implementation.frontendJs],
                [ui.backendRouter, implementation.backendRouter || ui.noRouter],
                [ui.commonService, serviceFiles.join(", ")],
                [ui.sqlTemplate, implementation.sqlFiles.join(", ")]
            ];

            return `<dl>${rows.map(([name, value]) => `
                <div>
                    <dt>${escapeHtml(name)}</dt>
                    <dd><code>${escapeHtml(value)}</code></dd>
                </div>
            `).join("")}</dl>`;
        }

        function getHelpCacheAssets(pageCode, implementation) {
            const normalizedPageCode = window.HelpContentUtils.normalizePageCode(pageCode);
            const labels = currentHelpText.cache.assets;
            const assets = [
                { label: labels.shellJs, path: "js/app.js" },
                { label: labels.commonJs, path: "js/common.js" },
                { label: labels.menuConfig, path: "config/menu.config.js" },
                { label: labels.menuRenderer, path: "js/menu-renderer.js" },
                { label: labels.helpPopup, path: "help/page.html" },
                { label: labels.helpUtility, path: "help/help-utils.js" },
                { label: labels.helpContent, path: `help/${currentHelpContentPath.replace("./", "")}` }
            ];

            if (implementation.frontendHtml) {
                assets.push({ label: labels.currentMenuHtml, path: implementation.frontendHtml });
            }

            if (["M03001", "M03002", "M03003", "M03004"].includes(normalizedPageCode)) {
                assets.push({ label: labels.dataTemplateJs, path: "frontend/js/MCOM_DATA_WORK.js" });
                assets.push({ label: labels.currentMenuJs, path: `frontend/js/${normalizedPageCode}.js` });
            } else if (normalizedPageCode === "M04001") {
                assets.push({ label: labels.flowTemplateJs, path: "frontend/js/MCOM_FLOW_WORK.js" });
                assets.push({ label: labels.currentMenuJs, path: "frontend/js/M04001.js" });
            } else if (normalizedPageCode === "M04002") {
                assets.push({ label: labels.analysisTemplateJs, path: "frontend/js/MCOM_ANLY_WORK.js" });
            } else if (implementation.frontendJs) {
                assets.push({ label: labels.currentMenuJs, path: implementation.frontendJs });
            }

            return assets;
        }

        function renderCacheVersions(pageCode, implementation) {
            const rows = window.AssetCacheVersionUtils.buildRows(getHelpCacheAssets(pageCode, implementation));
            const config = window.AssetCacheVersionUtils.getConfig();
            const versionText = config.version || currentHelpText.cache.unknown;
            const body = rows.map((row) => `
                <tr>
                    <td>${escapeHtml(row.label)}</td>
                    <td><code>${escapeHtml(row.path)}</code></td>
                    <td><code>${escapeHtml(row.version || currentHelpText.cache.unknown)}</code></td>
                    <td class="cache-version-source">${escapeHtml(row.source)}</td>
                </tr>
            `).join("");
            const [typeColumn, fileColumn, versionColumn, sourceColumn] = currentHelpText.cache.columns;

            return `
                <section class="full" data-ai-section="cache-version">
                    <h2>${escapeHtml(currentHelpText.sectionTitles.cache)}</h2>
                    <p>${currentHelpText.cache.intro.replace("{version}", `<code>${escapeHtml(versionText)}</code>`)}</p>
                    <table class="cache-version-table">
                        <thead>
                            <tr>
                                <th>${escapeHtml(typeColumn)}</th>
                                <th>${escapeHtml(fileColumn)}</th>
                                <th>${escapeHtml(versionColumn)}</th>
                                <th>${escapeHtml(sourceColumn)}</th>
                            </tr>
                        </thead>
                        <tbody>${body}</tbody>
                    </table>
                </section>
            `;
        }

        function renderOptionalSection(title, items, sectionKey, extraClass = "") {
            if (!Array.isArray(items) || !items.length) return "";
            return `
                <section class="${escapeHtml(extraClass)} full" data-ai-section="${escapeHtml(sectionKey)}">
                    <h2>${escapeHtml(title)}</h2>
                    ${renderList(items)}
                </section>
            `;
        }

        function getImplementationItems(page, implementation, key) {
            const pageItems = Array.isArray(page?.[key]) ? page[key].filter(Boolean) : [];
            if (pageItems.length) return pageItems;
            if (currentHelpLanguage === "ko") {
                const implementationItems = Array.isArray(implementation?.[key]) ? implementation[key].filter(Boolean) : [];
                if (implementationItems.length) return implementationItems;
            }
            const defaults = {
                sqlPurposes: ["Supports the menu-specific searches, saves, executions, or result lookups used by this screen."],
                logicalDataDomains: ["Menu state and user context", "Target DB context", "Business data or result data used by this screen"],
                publicModelDetails: ["Model and AI details are described only at a public conceptual level."]
            };
            return defaults[key] || [];
        }

        function renderHelp(page) {
            const implementation = window.HelpContentUtils.buildImplementation(page.pageCode);
            const sections = currentHelpText.sectionTitles;
            const optionalTitles = currentHelpText.optionalTitles;
            const sqlPurposes = getImplementationItems(page, implementation, "sqlPurposes");
            const logicalDataDomains = getImplementationItems(page, implementation, "logicalDataDomains");
            const publicModelDetails = getImplementationItems(page, implementation, "publicModelDetails");
            const privacyNote = page.privacyNote || (currentHelpLanguage === "en" ? currentHelpText.privacyFallback : implementation.privacyNote);
            const pageTitle = page.title || page.label || page.pageCode;
            document.documentElement.dataset.menuCode = page.pageCode;
            document.title = `${pageTitle} ${currentHelpText.helpWord} - INIT Data Editing System`;
            document.getElementById("helpTitle").textContent = `${pageTitle} ${currentHelpText.helpWord}`;
            document.getElementById("helpSummary").textContent = page.summary || "";
            document.getElementById("helpMeta").innerHTML = [
                `${currentHelpText.meta.menuCode}: ${page.pageCode}`,
                `${currentHelpText.meta.group}: ${page.group || "-"}`,
                `${currentHelpText.meta.status}: ${page.status || "enabled"}`
            ].map((item) => `<span>${escapeHtml(item)}</span>`).join("");

            const publicModels = publicModelDetails.length
                ? renderList(publicModelDetails)
                : `<p>${escapeHtml(currentHelpText.publicModelsFallback)}</p>`;

            document.getElementById("helpMain").innerHTML = `
                <section class="ai-note" data-ai-section="summary">
                    <h2>${escapeHtml(sections.summary)}</h2>
                    <p>${escapeHtml(page.summary || "")}</p>
                </section>

                <div class="grid">
                    <section data-ai-section="purpose">
                        <h2>${escapeHtml(sections.purpose)}</h2>
                        ${renderList(page.purpose)}
                    </section>

                    <section data-ai-section="workflow">
                        <h2>${escapeHtml(sections.workflow)}</h2>
                        ${renderList(page.workflow)}
                    </section>

                    <section class="full" data-ai-section="layout">
                        <h2>${escapeHtml(sections.layout)}</h2>
                        ${renderDefinitionList(page.layout)}
                    </section>

                    <section data-ai-section="controls">
                        <h2>${escapeHtml(sections.controls)}</h2>
                        ${renderList(page.controls)}
                    </section>

                    <section data-ai-section="ai-guidance">
                        <h2>${escapeHtml(sections.aiGuidance)}</h2>
                        ${renderList(page.aiGuidance)}
                    </section>

                    <section class="full" data-ai-section="implementation">
                        <h2>${escapeHtml(sections.implementation)}</h2>
                        ${renderImplementation(implementation)}
                    </section>

                    <section data-ai-section="sql-purpose">
                        <h2>${escapeHtml(sections.sqlPurpose)}</h2>
                        ${renderList(sqlPurposes)}
                    </section>

                    <section data-ai-section="logical-data">
                        <h2>${escapeHtml(sections.logicalData)}</h2>
                        ${renderList(logicalDataDomains)}
                    </section>

                    <section class="full" data-ai-section="public-models">
                        <h2>${escapeHtml(sections.publicModels)}</h2>
                        ${publicModels}
                    </section>

                    ${renderOptionalSection(optionalTitles.deepDive, page.deepDive, "deep-dive", "ai-note")}
                    ${renderOptionalSection(optionalTitles.interpretationGuide, page.interpretationGuide, "interpretation-guide")}
                    ${renderOptionalSection(optionalTitles.troubleshooting, page.troubleshooting, "troubleshooting")}
                    ${renderOptionalSection(optionalTitles.implementationNotes, page.implementationNotes, "implementation-notes")}

                    <section class="warning-note full" data-ai-section="privacy">
                        <h2>${escapeHtml(sections.privacy)}</h2>
                        <p>${escapeHtml(privacyNote)}</p>
                    </section>

                    ${renderCacheVersions(page.pageCode, implementation)}
                </div>
            `;
        }

        async function initHelp() {
            const params = new URLSearchParams(window.location.search);
            currentHelpLanguage = resolveHelpLanguage(params);
            currentHelpText = HELP_UI[currentHelpLanguage] || HELP_UI.en;
            currentHelpContentPath = getHelpContentPath(currentHelpLanguage);
            document.documentElement.lang = currentHelpLanguage;
            document.getElementById("helpTitle").textContent = currentHelpText.loadingTitle;
            document.getElementById("helpSummary").textContent = currentHelpText.loadingSummary;
            const requestedPage = window.HelpContentUtils.normalizePageCode(params.get("page") || "home");
            const content = await fetchHelpContent(currentHelpContentPath);
            const pageSource = content.pages[requestedPage] || content.pages[requestedPage.toUpperCase?.()] || content.pages.home;
            const page = window.HelpContentUtils.prepareHelpPage(pageSource, currentHelpLanguage);
            renderHelp(page);
        }

        initHelp().catch((error) => {
            document.getElementById("helpSummary").textContent = `${currentHelpText.loadFailed}: ${error.message}`;
        });
    </script>
</body>
</html>
